<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Dark Floof II — Full Engine</title>
<style>
body{
margin:0;
background:#0b0b0f;
color:#d4d4d4;
font-family:monospace;
display:flex;
flex-direction:column;
height:100vh;
}
#terminal{
flex:1;
overflow-y:auto;
padding:20px;
white-space:pre-wrap;
}
#inputBar{
border-top:1px solid #333;
display:flex;
}
#commandInput{
flex:1;
padding:12px;
font-size:16px;
background:#111;
color:#fff;
border:none;
outline:none;
font-family:monospace;
}
.enemy{color:#ff5555;}
.success{color:#50fa7b;}
.warning{color:#f1fa8c;}
.prompt{color:#8be9fd;}
.mask{color:#bd93f9;}
.limit{color:#ff79c6;}
</style>
</head>
<body>
<div id="terminal"></div>
<div id="inputBar">
<input id="commandInput" autocomplete="off" placeholder="Type command...">
</div>

<script>

// =========================
// UTIL
// =========================

function rand(min,max){return Math.floor(Math.random()*(max-min+1))+min;}
function chance(p){return Math.random()<p;}
function clamp(v,min,max){return Math.max(min,Math.min(max,v));}

// =========================
// TERMINAL
// =========================

const term=document.getElementById("terminal");
const input=document.getElementById("commandInput");

function print(txt,cls=""){
const div=document.createElement("div");
if(cls)div.classList.add(cls);
div.textContent=txt;
term.appendChild(div);
term.scrollTop=term.scrollHeight;
}
function clearTerm(){term.innerHTML="";}

// =========================
// CONSTANT DATA
// =========================

const BIOMES=["stacks","null_wing","binding_floor","fang_vault"];
const ROOM_NAMES=["Dustfall Aisle","Shadow Stacks","Ink Corridor","Binding Hall"];
const ROOM_DESC=[
"Shelves lean inward.",
"Ink drips from ceiling.",
"The silence feels curated.",
"You hear distant pages turning."
];
const NULL_LINES=[
"You can rest.",
"Nothing will chase you.",
"Ending is closure.",
"You look tired."
];
const PAGE_TYPES=["ink","memory","null","binding","index"];
const FACTIONS=["kennel","order","null"];

// =========================
// CORE CLASSES
// =========================

class Room{
constructor(biome="stacks"){
this.biome=biome;
this.name=ROOM_NAMES[rand(0,ROOM_NAMES.length-1)];
this.desc=ROOM_DESC[rand(0,ROOM_DESC.length-1)];
this.exits={};
this.enemyGroup=[];
this.npc=null;
this.shelves=chance(0.7);
}
}

class Enemy{
constructor(type="generic"){
this.name=["Ink Wraith","Null Echo","Shelf Crawler"][rand(0,2)];
this.hp=rand(22,35);
this.maxHp=this.hp;
this.atk=rand(6,10);
this.def=rand(2,5);
this.speed=rand(8,12);
this.alive=true;
}
}

class PartyMember{
constructor(name,faction){
this.name=name;
this.faction=faction;
this.hp=rand(30,40);
this.maxHp=this.hp;
this.atk=rand(7,10);
this.def=rand(3,6);
this.speed=rand(8,12);
this.limitReady=false;
}
}

class Player{
constructor(name){
this.name=name;
this.maxHp=50;
this.hp=50;
this.atk=10;
this.def=5;
this.speed=10;
this.scraps=100;
this.dread=0;
this.pages={ink:0,memory:0,null:0,binding:0,index:0};
this.inventory={medication:3};
this.faction=null;
this.reputation={kennel:0,order:0,null:0};
this.party=[];
this.room=null;
this.lingerCounter=0;
this.mask=null;
}
}

// =========================
// GAME ENGINE
// =========================

class Game{
constructor(){
this.player=null;
this.running=false;
this.waitingName=true;
this.lingerActive=false;
this.lingerRoom=null;
}

start(){
clearTerm();
print("████ DARK FLOOF II ████");
print("The Stacks Beneath\n");
print("Enter your name:");
}

init(name){
this.player=new Player(name||"Floof");
this.generateStart();
this.running=true;
this.waitingName=false;
print("\nWelcome, "+this.player.name+".");
this.describe();
}

generateStart(){
let entry=new Room("stacks");
let hub=new Room("stacks");
entry.exits["north"]=hub;
hub.exits["south"]=entry;
this.player.room=entry;
}

describe(){
let r=this.player.room;
print("\n== "+r.name+" ("+r.biome+") ==");
print(r.desc);

if(r.enemyGroup.length>0){
r.enemyGroup.forEach(e=>{
if(e.alive)print("Enemy: "+e.name,"enemy");
});
}

print("Exits: "+Object.keys(r.exits).join(", "));
}

}
// =========================
// COMBAT ENGINE (ATB SYSTEM)
// =========================

Game.prototype.startBattle = function(enemyCount=1){

print("\n[Battle Begins]","warning");

let enemies=[];
for(let i=0;i<enemyCount;i++){
enemies.push(new Enemy());
}

let roster=[];
let playerActor={
type:"player",
ref:this.player,
hp:this.player.hp,
maxHp:this.player.maxHp,
atk:this.player.atk,
def:this.player.def,
speed:this.player.speed,
limitReady:false
};

roster.push(playerActor);

this.player.party.forEach(p=>{
roster.push({
type:"ally",
ref:p,
hp:p.hp,
maxHp:p.maxHp,
atk:p.atk,
def:p.def,
speed:p.speed,
limitReady:false
});
});

enemies.forEach(e=>{
roster.push({
type:"enemy",
ref:e,
hp:e.hp,
maxHp:e.maxHp,
atk:e.atk,
def:e.def,
speed:e.speed
});
});

let atb=new Map();
roster.forEach(c=>atb.set(c,0));

const battleLoop=()=>{
if(!this.running)return;

roster.forEach(c=>{
if(c.hp>0){
atb.set(c,atb.get(c)+c.speed);
}
});

let actor=[...atb.keys()].find(c=>atb.get(c)>=100 && c.hp>0);

if(actor){
atb.set(actor,0);

if(actor.type==="enemy"){
this.enemyTurn(actor,roster);
}else{
this.playerTurn(actor,roster);
}
}

if(this.checkBattleEnd(roster,enemies)){
clearInterval(interval);
this.player.hp=playerActor.hp;
print("\n[Battle Ends]","success");
this.describe();
}

};

let interval=setInterval(battleLoop,100);

};

Game.prototype.enemyTurn=function(actor,roster){
let targets=roster.filter(c=>c.type!=="enemy" && c.hp>0);
if(targets.length===0)return;

let target=targets[rand(0,targets.length-1)];

let dmg=Math.max(1,actor.atk-target.def);
target.hp-=dmg;

print(actor.ref.name+" hits "+(target.ref.name||this.player.name)+" for "+dmg,"enemy");

if(target.type==="player"){
this.player.hp=target.hp;
if(this.player.hp<=0){
print("You collapse.","warning");
this.running=false;
}
}
};

Game.prototype.playerTurn=function(actor,roster){

print("\nYour turn:");
print("1. Attack");
print("2. Skill");
print("3. Use Page");
print("4. Guard");
print("5. Item");

this.awaitingBattleInput=true;

this.battleContext={actor,roster};

};

Game.prototype.resolveBattleInput=function(choice){

let {actor,roster}=this.battleContext;

let enemies=roster.filter(c=>c.type==="enemy" && c.hp>0);

if(choice==="1"){
let target=enemies[0];
if(!target)return;
let dmg=Math.max(1,actor.atk-target.def);
target.hp-=dmg;
print("You strike "+target.ref.name+" for "+dmg);
}

else if(choice==="2"){
let target=enemies[0];
if(!target)return;
let dmg=rand(12,18);
target.hp-=dmg;
print("Special skill hits for "+dmg);
}

else if(choice==="3"){
let keys=Object.keys(this.player.pages);
let usable=keys.find(k=>this.player.pages[k]>0);
if(!usable){
print("No pages.");
}else{
this.player.pages[usable]--;
let dmg=rand(15,25);
enemies[0].hp-=dmg;
print("Page burns enemy for "+dmg);
}
}

else if(choice==="4"){
actor.def+=3;
print("You brace for impact.");
}

else if(choice==="5"){
if(this.player.inventory.medication>0){
this.player.inventory.medication--;
let heal=rand(12,20);
actor.hp=clamp(actor.hp+heal,0,actor.maxHp);
this.player.hp=actor.hp;
print("Healed "+heal,"success");
}else{
print("Out of medication.");
}
}

this.awaitingBattleInput=false;

};

Game.prototype.checkBattleEnd=function(roster,enemies){

let aliveEnemies=enemies.filter(e=>e.hp>0);
if(aliveEnemies.length===0){
print("Enemies defeated.","success");
return true;
}

let aliveAllies=roster.filter(c=>c.type!=="enemy" && c.hp>0);
if(aliveAllies.length===0){
print("Party defeated.","warning");
this.running=false;
return true;
}

return false;

};
// =========================
// MASK SYSTEM
// =========================

class SoulMask{
constructor(name,arcana,stats,passives){
this.name=name;
this.arcana=arcana;
this.stats=stats;
this.passives=passives||[];
this.level=1;
this.xp=0;
}
}

Game.prototype.initMaskSystem=function(){
this.player.mask=new SoulMask(
"Ink-Scared Pup",
"unwritten",
{hp:0,atk:0,def:0,speed:0},
[]
);
};

Game.prototype.applyMaskStats=function(){
if(!this.player.mask)return;
let m=this.player.mask;
this.player.maxHp+=m.stats.hp;
this.player.atk+=m.stats.atk;
this.player.def+=m.stats.def;
this.player.speed+=m.stats.speed;
};

Game.prototype.gainRandomMask=function(){
const pool=[
new SoulMask("Null Echo Self","null",{hp:-5,atk:4,def:1,speed:2},["dread_resist"]),
new SoulMask("First-Birth Hunter","kennel",{hp:5,atk:5,def:2,speed:2},["speed_bonus"]),
new SoulMask("Unwritten Librarian","order",{hp:8,atk:2,def:4,speed:1},["page_boost"])
];
let mask=pool[rand(0,pool.length-1)];
this.player.mask=mask;
print("New Mask: "+mask.name,"mask");
};

// =========================
// FUSION SYSTEM
// =========================

Game.prototype.fuseMasks=function(){
print("Fusion initiated...");
let newMask=new SoulMask(
"Fused Entity",
"fang",
{hp:10,atk:8,def:5,speed:3},
["limit_charge"]
);
this.player.mask=newMask;
print("You become something new.","mask");
};

// =========================
// LINGERER SYSTEM
// =========================

Game.prototype.tickLinger=function(){

this.player.lingerCounter++;

if(this.player.lingerCounter>6 && !this.lingerActive){
this.lingerActive=true;
this.lingerRoom=this.player.room;
print("\nSomething begins walking.","warning");
}

if(this.lingerActive){
if(this.player.room===this.lingerRoom){
this.player.dread+=30;
print("A tall shape stands behind you.","warning");
}
else if(chance(0.3)){
print("Footsteps echo nearby.","warning");
this.player.dread+=10;
}

if(this.player.dread>=100){
print("The Lingerer finds you.","warning");
this.running=false;
}
}

};

// =========================
// CHASE SEQUENCE
// =========================

Game.prototype.startChase=function(){
print("CHASE BEGINS","warning");
for(let i=0;i<3;i++){
if(chance(0.5)){
print("You gain distance.");
this.player.dread-=10;
}else{
print("It closes in!");
this.player.dread+=15;
}
}
if(this.player.dread>=100){
print("You are caught.","warning");
this.running=false;
}else{
print("You escape narrowly.","success");
}
};

// =========================
// ROOM GENERATION
// =========================

Game.prototype.generateRoom=function(from,dir){
let biome=BIOMES[rand(0,BIOMES.length-1)];
let room=new Room(biome);
room.exits[this.opposite(dir)]=from;

if(chance(0.6))room.enemyGroup=[new Enemy()];
if(chance(0.2)){
room.npc={
name:["Kennel Scribe","Order Archivist","Null Attendant"][rand(0,2)],
faction:FACTIONS[rand(0,2)]
};
}

return room;
};

Game.prototype.move=function(dir){

let r=this.player.room;

if(!r.exits[dir]){
let newRoom=this.generateRoom(r,dir);
r.exits[dir]=newRoom;
}

this.player.room=r.exits[dir];

this.describe();
this.tickLinger();
};

// =========================
// SHELVES
// =========================

Game.prototype.searchShelves=function(){
if(!this.player.room.shelves){
print("Nothing here.");return;
}
print("You inspect shelves...");

if(chance(0.4)){
let type=PAGE_TYPES[rand(0,PAGE_TYPES.length-1)];
this.player.pages[type]++;
print("Found "+type+" page.","success");
}
else if(chance(0.2)){
this.gainRandomMask();
}
else{
print(NULL_LINES[rand(0,NULL_LINES.length-1)]);
this.player.dread+=5;
}
};

// =========================
// NPC INTERACTION
// =========================

Game.prototype.talk=function(){
let npc=this.player.room.npc;
if(!npc){print("No one here.");return;}

print(npc.name+" speaks.");
this.player.reputation[npc.faction]++;
print("Reputation with "+npc.faction+" increased.");

if(this.player.reputation[npc.faction]>=3){
print("They offer to join.");
let member=new PartyMember(npc.name,npc.faction);
this.player.party.push(member);
print(npc.name+" joins your party.","success");
}
};

// =========================
// SAVE / LOAD FULL STATE
// =========================

Game.prototype.save=function(){
localStorage.setItem("df_full_save",JSON.stringify(this.player));
print("Game saved.","success");
};

Game.prototype.load=function(){
let s=localStorage.getItem("df_full_save");
if(!s){print("No save.");return;}
this.player=Object.assign(new Player(""),JSON.parse(s));
print("Game loaded.","success");
this.describe();
};

// =========================
// COMMAND HANDLER
// =========================

input.addEventListener("keydown",(e)=>{

if(e.key!=="Enter")return;

let cmd=input.value.trim();
input.value="";
print("> "+cmd,"prompt");

if(game.waitingName){
game.init(cmd);
game.initMaskSystem();
return;
}

if(!game.running){
print("The Stacks are silent.");
return;
}

if(game.awaitingBattleInput){
game.resolveBattleInput(cmd);
return;
}

cmd=cmd.toLowerCase();

if(["north","n"].includes(cmd))game.move("north");
else if(["south","s"].includes(cmd))game.move("south");
else if(["east","e"].includes(cmd))game.move("east");
else if(["west","w"].includes(cmd))game.move("west");
else if(cmd==="attack")game.startBattle(1);
else if(cmd==="search")game.searchShelves();
else if(cmd==="talk")game.talk();
else if(cmd==="status"){
print("HP:"+game.player.hp+"/"+game.player.maxHp+
" | Dread:"+game.player.dread+
" | Mask:"+(game.player.mask?game.player.mask.name:"None"));
}
else if(cmd==="fuse")game.fuseMasks();
else if(cmd==="chase")game.startChase();
else if(cmd==="save")game.save();
else if(cmd==="load")game.load();
else print("The library ignores that command.");

});

// =========================
// START GAME
// =========================

const game=new Game();
game.start();

</script>
</body>
</html>
