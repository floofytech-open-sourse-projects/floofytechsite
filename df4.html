<meta charset="UTF-8">

<title>Dark Floof IV — The Overnight</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0a0a;
    --fg:      #c8c8b8;
    --dim:     #555548;
    --accent:  #a0a890;
    --red:     #c84040;
    --green:   #60a860;
    --yellow:  #c8a840;
    --cursor:  #c8c8b8;
  }

  html, body {
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: 'Share Tech Mono', 'Courier New', monospace;
    font-size: 14px;
    line-height: 1.6;
  }

  #terminal {
    display: flex;
    flex-direction: column;
    height: 100vh;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 12px;
  }

  #output {
    flex: 1;
    overflow-y: auto;
    padding: 16px 0 8px;
    scroll-behavior: smooth;
  }

  .line { padding: 0; white-space: pre-wrap; word-break: break-word; }
  .line.dim    { color: var(--dim); }
  .line.accent { color: var(--accent); }
  .line.red    { color: var(--red); }
  .line.green  { color: var(--green); }
  .line.yellow { color: var(--yellow); }
  .line.bold   { color: #e8e8d8; }
  .line.sep    { color: var(--dim); }

  #input-row {
    display: flex;
    align-items: center;
    border-top: 1px solid #1e1e18;
    padding: 8px 0 12px;
    gap: 6px;
  }

  #prompt { color: var(--dim); flex-shrink: 0; }

  #cmd {
    background: transparent;
    border: none;
    outline: none;
    color: var(--fg);
    font-family: inherit;
    font-size: inherit;
    flex: 1;
    caret-color: var(--cursor);
  }

  /* scrollbar */
  #output::-webkit-scrollbar { width: 4px; }
  #output::-webkit-scrollbar-track { background: transparent; }
  #output::-webkit-scrollbar-thumb { background: #2a2a22; border-radius: 2px; }

  /* status bar */
  #statusbar {
    display: flex;
    gap: 16px;
    padding: 6px 0;
    border-bottom: 1px solid #1e1e18;
    color: var(--dim);
    font-size: 12px;
    flex-wrap: wrap;
  }
  #statusbar span { color: var(--fg); }
  .sb-frac-low  { color: var(--green) !important; }
  .sb-frac-mid  { color: var(--yellow) !important; }
  .sb-frac-high { color: var(--red) !important; }
</style>
</head>
<body>
<div id="terminal">
  <div id="statusbar">
    <div id="sb-name">―</div>
    <div id="sb-hp">HP: ―</div>
    <div id="sb-room">Room: ―</div>
    <div id="sb-frac">Fracture: ―</div>
    <div id="sb-gun">Gun: None</div>
    <div id="sb-scraps">Scraps: ―</div>

  <div id="output"></div>
  <div id="input-row">
    <span id="prompt">&gt;&nbsp;</span>
    <input id="cmd" type="text" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false" autofocus />
  </div>
</div>

function ri(a, b) { return Math.floor(Math.random() * (b - a + 1)) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

let G = null; // game state

function newGame(name, difficulty) {
  const dm = difficulty === "gentle" ? 0.75 : difficulty === "cruel" ? 1.3 : 1.0;
  const fm = difficulty === "gentle" ? 0.6  : difficulty === "cruel" ? 1.4 : 1.0;
  const er = difficulty === "gentle" ? 0.50 : difficulty === "cruel" ? 0.90 : 0.75;

  G = {
    phase: "play",   // title | warning | name | difficulty | about | play | combat | gun | search | done
    name,
    difficulty,
    damageMult: dm,
    fractureMult: fm,
    encounterRate: er,

    // player
    hp: 45, maxHp: 45,
    atk: 9, def: 4, spd: 10,
    scraps: 80,
    bandage: 3, roomService: 0,
    fracture: 0,
    shells: 0,
    gun: null,

    // hotel
    rooms: [],
    currentRoom: 0,
    roomsCleared: 0,

    // combat
    inCombat: false,
    enemy: null,
    atbPlayer: 0,
    atbEnemy: 0,
    combatDefBonus: 0,

    // pending input
    pendingConfirm: null,  // { type, data, yes, no }
  };
  buildHotel();
}

function buildHotel() {
  G.rooms = [];
  let roomNum = 1;
  FLOORS.forEach((floor, floorIdx) => {
    const theme = floor.theme;
    const names = ROOM_NAMES[theme].slice();
    const descs = ROOM_DESCS[theme].slice();
    for (let i = 0; i < 10; i++) {
      const isBoss = (i === 9);
      const name = isBoss ? FLOOR_BOSS_NAMES[floorIdx] + "'s Domain" : (names[i] || floor.name + " Room " + (i+1));
      const desc = isBoss ? floor.desc : pick(descs);
      const lore = Math.random() < 0.5 ? pick(ROOM_LORE) : null;
      const room = { number: roomNum, name, desc, lore, floor: floorIdx+1, theme, isBoss, visited: false, enemy: null, combatTriggered: false };
      if (isBoss) {
        room.enemy = genBoss(floorIdx);
      } else if (Math.random() < G.encounterRate) {
        room.enemy = genEnemy(theme);
      }
      G.rooms.push(room);
      roomNum++;
    }
  });
}

function genEnemy(theme) {
  const pool = ENEMY_POOL[theme] || ENEMY_POOL.lobby;
  const e = pick(pool);
  return { name: e.name, hp: ri(e.hp[0], e.hp[1]), maxHp: 0, atk: ri(e.atk[0], e.atk[1]), def: ri(e.def[0], e.def[1]), spd: 9, desc: e.desc, isBoss: false };
}

function genBoss(fi) {
  const hp = 30 + fi*15 + ri(10,20);
  return { name: FLOOR_BOSS_NAMES[fi], hp, maxHp: hp, atk: 10+fi*2+ri(2,5), def: 5+fi, spd: 11, desc: FLOOR_BOSS_DESCS[fi], isBoss: true };
}

function curRoom() { return G.rooms[G.currentRoom]; }

const out = document.getElementById("output");

function print(text, cls) {
  const lines = String(text).split("\n");
  lines.forEach(l => {
    const div = document.createElement("div");
    div.className = "line" + (cls ? " " + cls : "");
    div.textContent = l;
    out.appendChild(div);
  });
  out.scrollTop = out.scrollHeight;
}

function blank() { print(""); }

function printSep(char, len) { print((char||"─").repeat(len||50), "sep dim"); }

function updateStatusBar() {
  if (!G) return;
  const r = curRoom();
  const floorName = r ? FLOORS[r.floor-1].name : "―";
  document.getElementById("sb-name").innerHTML = G.name;
  document.getElementById("sb-hp").innerHTML = `HP: <span style="color:${G.hp < G.maxHp*0.3?"var(--red)":G.hp < G.maxHp*0.6?"var(--yellow)":"var(--green)"}">${G.hp}/${G.maxHp}</span>`;
  document.getElementById("sb-room").innerHTML = `${floorName} · Room <span>${G.currentRoom+1}/70</span>`;
  const fc = G.fracture < 30 ? "sb-frac-low" : G.fracture < 70 ? "sb-frac-mid" : "sb-frac-high";
  document.getElementById("sb-frac").innerHTML = `Fracture: <span class="${fc}">${G.fracture}/100</span>`;
  document.getElementById("sb-gun").innerHTML = G.gun ? `Gun: <span>${G.gun.name} [${G.shells}sh]</span>` : "Gun: <span>None</span>";
  document.getElementById("sb-scraps").innerHTML = `Scraps: <span>${G.scraps}</span>`;
}

function handleSetup(cmd) {
  const c = cmd.trim().toLowerCase();
  if (setupPhase === "title") {
    if (c === "1") { showWarning(); }
    else if (c === "2") { showAbout(); }
    else if (c === "3") {
      setupPhase = "difficulty";
      blank();
      print("1. Gentle  — lighter enemies, slower fracture");
      print("2. Normal");
      print("3. Cruel   — full staff, fast fracture, hard hits");
    }
    else if (c === "4") { print("The hotel will be here when you're ready.", "dim"); }
  }
  else if (setupPhase === "about") { startTitle(); }
  else if (setupPhase === "warning") {
    if (c === "quit") { print("Take care of yourself.", "dim"); setupPhase = "title"; }
    else if (c === "continue") { askName(); }
    else { print("Type CONTINUE to proceed.", "dim"); }
  }
  else if (setupPhase === "difficulty") {
    if (c === "1") pendingDifficulty = "gentle";
    else if (c === "3") pendingDifficulty = "cruel";
    else pendingDifficulty = "normal";
    print("Difficulty: " + pendingDifficulty, "accent");
    startTitle();
  }
  else if (setupPhase === "name") {
    const name = cmd.trim() || "Guest";
    pendingName = name;
    newGame(name, pendingDifficulty);
    blank();
    print('"Room 101," the concierge says.', "dim");
    print(`"Enjoy your stay, ${name}."`, "dim");
    print('"We hope you find what you\'re looking for."', "dim");
    blank();
    print("(The smile doesn't reach its eyes. It doesn't have eyes, exactly.)", "dim");
    blank();
    setupPhase = "play";
    showStatus();
    describeRoom();
    updateStatusBar();
  }
}

function setPrompt(p) {
  document.getElementById("prompt").textContent = (p || ">") + " ";
}

function showStatus() {
  if (!G) return;
  const r = curRoom();
  const floorName = r ? FLOORS[r.floor-1].name : "?";
  blank();
  printSep();
  print(`[${G.name} | ${floorName} | Room ${G.currentRoom+1}/70]`, "accent");
  print(`HP: ${G.hp}/${G.maxHp} | Scraps: ${G.scraps}`, G.hp < G.maxHp*0.3 ? "red" : "");
  print(`Fracture: ${G.fracture}/100`, G.fracture >= 70 ? "red" : G.fracture >= 40 ? "yellow" : "");
  print(`Bandages: ${G.bandage} | Room Service: ${G.roomService}`);
  print(G.gun ? `Gun: ${G.gun.name} | Shells: ${G.shells}` : `Gun: None | Shells: ${G.shells}`);
  printSep();
}

function fractureTick() {
  const f = G.fracture;
  if (f >= 15 && f < 30)  print("(The carpet has a smell you recognise from somewhere you haven't been.)", "dim");
  else if (f >= 30 && f < 45) print("(A crack in the wall. It wasn't there when you entered. The crack is the exact width of a finger.)", "dim");
  else if (f >= 45 && f < 60) print("(You catch yourself listening for your name. You keep almost hearing it.)", "dim");
  else if (f >= 60 && f < 75) print("(The lights are the right brightness. The shadows are the wrong length.)", "dim");
  else if (f >= 75 && f < 90) print("(You check your reflection. The reflection checks back. A half-second late.)", "dim");
  else if (f >= 90)           print("(The hotel is almost finished with you. You can feel it. Like a conversation winding down.)", "red");
}

function describeRoom(forceLore) {
  if (!G) return;
  const r = curRoom();
  if (!r) return;
  blank();
  const floorName = FLOORS[r.floor-1].name;
  print(`[${floorName} — Room ${r.number}]`, "dim");
  print(r.isBoss ? `=== ${r.name} ===` : r.name, "bold");
  print(r.desc);
  if (r.lore && (!r.visited || forceLore)) print(r.lore, "dim");
  r.visited = true;
  fractureTick();
  blank();
  if (r.enemy && r.enemy.hp > 0) {
    if (r.isBoss) {
      print(r.enemy.name, "yellow");
      print(`"${pick(FLOOR_BOSS_LINES[r.floor-1])}"`, "dim");
      print("(You must defeat it to advance.)", "dim");
    } else {
      print(r.enemy.name, "yellow");
      print(r.enemy.desc, "dim");
      print("(Type FIGHT to engage.)", "dim");
    }
    if (!r.combatTriggered) {
      r.combatTriggered = true;
      blank();
      if (r.isBoss) print("It doesn't let you think about it.", "dim");
      startCombat(r.enemy);
      return;
    }
  } else {
    print("(The room is clear. Type NEXT to advance.)", "dim");
  }
}

function handlePlay(cmd) {
  const c = cmd.trim().toLowerCase();

  if (G.pendingConfirm) {
    const pc = G.pendingConfirm;
    G.pendingConfirm = null;
    if (c === "y" || c === "yes") pc.yes();
    else pc.no();
    updateStatusBar();
    return;
  }

  if (G.inCombat) { handleCombatInput(cmd); updateStatusBar(); return; }

  switch(c) {
    case "next": case "n": case "forward": advanceRoom(); break;
    case "look": case "l": describeRoom(true); break;
    case "fight": case "attack": case "battle": fightCurrentRoom(); break;
    case "search": searchRoom(); break;
    case "status": showStatus(); break;
    case "gun": showGunMenu(); break;
    case "rest": doRest(); break;
    case "help": showHelp(); break;
    case "quit": case "exit":
      blank();
      print("The hotel notes your departure attempt.", "dim");
      print("It is, as always, optimistic about your return.", "dim");
      setupPhase = "title";
      G = null;
      startTitle();
      return;
    default:
      print("The hotel doesn't recognise that.", "dim");
  }
  updateStatusBar();
  if (G && !G.inCombat && G.currentRoom < 70 && G.hp > 0) {
    // don't auto-redescribe after every command, just update bar
  }
}

function showHelp() {
  blank();
  print("=== COMMANDS ===", "accent");
  print("look / l    — describe current room");
  print("next        — advance to the next room (if clear)");
  print("fight       — fight the enemy in this room");

  print("status      — full status");

function advanceRoom() {
  const r = curRoom();
  if (r && r.enemy && r.enemy.hp > 0) { print("Something is still in your way.", "dim"); return; }
  if (G.currentRoom >= 69) {
    G.currentRoom = 70;
    checkWinLose();
    return;
  }
  const oldFloor = curRoom().floor;
  G.currentRoom++;
  G.roomsCleared++;
  const newRoom = curRoom();
  if (newRoom.floor > oldFloor) {
    blank();
    printSep("═");
    print("  " + FLOORS[newRoom.floor-1].name.toUpperCase(), "bold");
    print("  " + FLOORS[newRoom.floor-1].desc, "dim");
    printSep("═");
    const fg = Math.round(ri(3,7) * G.fractureMult);
    addFracture(fg);
    print(`Moving between floors. +${fg} Fracture.`, "dim");
  }
  tryRandomEvent();
  if (G.hp > 0 && G.currentRoom < 70) {
    showStatus();
    describeRoom();
  }
  checkWinLose();
}

function tryRandomEvent() {
  if (Math.random() > 0.40) return;
  const roll = Math.random();
  if (roll < 0.15) {
    const dmg = ri(3,8);
    G.hp = Math.max(0, G.hp - dmg);
    blank();
    print("The lights go out.\nThey come back on.\nSomething has moved. Not the furniture.\nYou.\nYou are in a different part of the corridor than you were.\nYou don't remember moving.", "dim");
    print(`-${dmg} HP.`, "red");
  } else if (roll < 0.30) {
    const ev = pick(RANDOM_EVENTS_HORROR);
    blank();
    print(ev.text, "dim");
    if (ev.frac) {
      const f = Math.round(ri(ev.frac[0], ev.frac[1]) * G.fractureMult);
      addFracture(f);
      print(`+${f} Fracture.`, "red");
    }
    if (ev.dmg) {
      const d = ri(3,8);
      G.hp = Math.max(0, G.hp - d);
      print(`-${d} HP.`, "red");
    }
  } else if (roll < 0.45) {
    const ev = pick(RANDOM_EVENTS_GOOD);
    blank();
    print(ev.text, "dim");
    if (ev.type === "scraps") { const a = ri(ev.amount[0], ev.amount[1]); G.scraps += a; print(`+${a} scraps.`, "green"); }
    else if (ev.type === "shells") { const a = ri(ev.amount[0], ev.amount[1]); G.shells += a; print(`+${a} shells.`, "green"); }
    else if (ev.type === "bandage") { G.bandage++; print("+1 bandage.", "green"); }
    else if (ev.type === "voucher") { G.roomService++; print("+1 room service voucher.", "green"); }
  } else if (roll < 0.55) {
    blank();
    print(pick(ROOM_LORE), "dim");
    const f = Math.round(ri(2,6) * G.fractureMult);
    addFracture(f);
    print(`+${f} Fracture.`, "red");
  } else if (roll < 0.65 && !G.gun) {
    const gun = pick(HOTEL_GUNS);
    blank();
    print(`${gun.name}.`);
    print(gun.desc, "dim");
    print("Take it? (y/n)", "accent");
    G.pendingConfirm = {
      yes: () => { G.gun = gun; print(`You take the ${gun.name}.`, "green"); updateStatusBar(); },
      no:  () => { print("You leave it.", "dim"); }
    };
  }
  checkWinLose();
}

function addFracture(n) {
  G.fracture = clamp(G.fracture + n, 0, 100);
  if (G.fracture >= 100) { setTimeout(() => fractureCollapse(), 200); }
}

function fightCurrentRoom() {
  const r = curRoom();
  if (!r || !r.enemy || r.enemy.hp <= 0) { print("Nothing here to fight.", "dim"); return; }
  startCombat(r.enemy);
}

function startCombat(enemy) {
  enemy.maxHp = enemy.maxHp || enemy.hp;
  G.inCombat = true;
  G.enemy = enemy;
  G.atbPlayer = 0;
  G.atbEnemy = 0;
  G.combatDefBonus = 0;
  blank();
  printSep("─");
  print(`[${enemy.name}]`, "yellow");
  print(enemy.desc, "dim");
  printSep("─");
  if (enemy.isBoss) {
    print(`"${pick(FLOOR_BOSS_LINES[curRoom().floor-1])}"`, "dim");
    blank();
  }
  showCombatStatus();
  promptCombat();
}

function showCombatStatus() {
  blank();
  print(`--- COMBAT ---`, "dim");
  print(`YOU: HP ${G.hp}/${G.maxHp} | Fracture: ${G.fracture}`, G.hp < G.maxHp*0.3 ? "red" : "");
  print(`${G.enemy.name}: HP ${G.enemy.hp}/${G.enemy.maxHp}`);
  print(`--------------`, "dim");
}

function promptCombat() {
  const gunLabel = G.gun ? `Shoot [${G.shells}sh]` : "Shoot [no gun]";
  print(`Your turn: 1. Attack  2. Item  3. Guard  4. ${gunLabel}`, "accent");
}

function handleCombatInput(cmd) {
  const c = cmd.trim();
  const e = G.enemy;

  if (c === "fkill") { e.hp = 0; print(".", "dim"); endCombatCheck(); return; }

  let acted = false;
  if (c === "1") {
    const dmg = Math.max(1, Math.round((G.atk - e.def) * G.damageMult));
    e.hp = Math.max(0, e.hp - dmg);
    print(`You hit ${e.name} for ${dmg}.`);
    if (e.hp <= 0) print(`${e.name} collapses.`, "green");
    acted = true;
  } else if (c === "2") {
    acted = useCombatItem();
  } else if (c === "3") {
    G.combatDefBonus = 2;
    print("You brace against the wall.", "dim");
    acted = true;
  } else if (c === "4") {
    acted = shootCombat();
  } else {
    print("You freeze. The hotel doesn't.", "dim");
    acted = true;
  }

  if (!acted) return;
  endCombatCheck();
}

function useCombatItem() {
  blank();
  print(`Items: 1. Bandage (${G.bandage})  2. Room Service (${G.roomService})`, "accent");
  G.pendingConfirm = {
    yes: null,
    _itemPending: true
  };
  G.inCombat = true;
  // We'll re-route next input
  G._itemMenu = true;
  return false;
}

// We need a mini item sub-handler
let itemMenuOpen = false;
function handleCombatItemChoice(cmd) {
  const c = cmd.trim();
  G._itemMenu = false;
  if (c === "1") {
    if (G.bandage > 0) {
      G.bandage--;
      const heal = ri(10,16);
      G.hp = Math.min(G.maxHp, G.hp + heal);
      print(`You bandage the wound. +${heal} HP.`, "green");
    } else print("No bandages left.", "dim");
  } else if (c === "2") {
    if (G.roomService > 0) {
      G.roomService--;
      G.hp = G.maxHp;
      print("Room service arrives. Somehow. Full heal.", "green");
      const f = Math.round(5 * G.fractureMult);
      addFracture(f);
      print(`The bellhop doesn't leave. +${f} Fracture.`, "red");
    } else print("No room service vouchers.", "dim");
  } else { print("Nothing happens.", "dim"); }
  endCombatCheck();
}

function shootCombat() {
  if (!G.gun) { print("No gun equipped.", "dim"); return true; }
  if (G.shells < G.gun.shells) { print(`Not enough shells. Need ${G.gun.shells}, have ${G.shells}.`, "dim"); return true; }
  G.shells -= G.gun.shells;
  const e = G.enemy;
  if (G.gun.effect === "aoe") {
    const dmg = Math.round(ri(G.gun.dmgMin, G.gun.dmgMax) * G.damageMult);
    e.hp = Math.max(0, e.hp - dmg);
    print(`The shotgun fills the room with sound. ${e.name} takes ${dmg}.`);
  } else if (G.gun.effect === "suppress") {
    const dmg = Math.round(ri(G.gun.dmgMin, G.gun.dmgMax) * G.damageMult);
    e.hp = Math.max(0, e.hp - dmg);
    e.spd = Math.max(1, e.spd - 4);
    print(`The rifle cracks once. ${e.name} takes ${dmg}. It hesitates. SPD -4.`);
  } else {
    const dmg = Math.round(ri(G.gun.dmgMin, G.gun.dmgMax) * G.damageMult);
    e.hp = Math.max(0, e.hp - dmg);
    print(`You fire. ${e.name} takes ${dmg}.`);
    if (e.hp <= 0) print(`${e.name} collapses.`, "green");
  }
  print(`(${G.shells} shells left)`, "dim");
  return true;
}

function endCombatCheck() {
  const e = G.enemy;
  if (e.hp <= 0) {
    concludeFight(e);
    return;
  }
  if (G.hp <= 0) { G.inCombat = false; checkWinLose(); return; }
  // Enemy turn(s) via ATB simulation
  enemyTurn(e);
  if (G.hp <= 0) { G.inCombat = false; checkWinLose(); return; }
  if (G.fracture >= 100) { G.inCombat = false; fractureCollapse(); return; }
  showCombatStatus();
  promptCombat();
}

function enemyTurn(e) {
  if (e.hp <= 0) return;
  if (e.isBoss && Math.random() < 0.35) {
    const f = Math.round(ri(6,14) * G.fractureMult);
    addFracture(f);
    print(`${e.name} ${pick(BOSS_PASSIVE_LINES)}`, "dim");
    print(`+${f} Fracture.`, "red");
    return;
  }
  const effDef = G.def + G.combatDefBonus;
  G.combatDefBonus = 0;
  const dmg = Math.max(1, Math.round((e.atk - effDef) * G.damageMult));
  G.hp = Math.max(0, G.hp - dmg);
  print(`${e.name} ${pick(ATTACK_LINES)}`);
  print(`You take ${dmg}.`, G.hp < G.maxHp*0.3 ? "red" : "");
  if (G.hp <= 0) print("You collapse.", "red");
}

function concludeFight(e) {
  G.inCombat = false;
  blank();
  print(`${e.name} stops.`);
  const gain = ri(8,20) + (e.isBoss ? ri(15,30) : 0);
  G.scraps += gain;
  print(`You find ${gain} scraps.`, "green");
  if (Math.random() < 0.30) {
    const sh = ri(1,4);
    G.shells += sh;
    print(`${sh} shells on the floor.`, "green");
  }
  if (Math.random() < 0.10 && !G.gun) {
    const gun = pick(HOTEL_GUNS);
    print(`${gun.name} — left behind.`);
    print("Take it? (y/n)", "accent");
    G.pendingConfirm = {
      yes: () => { G.gun = gun; print(`You take the ${gun.name}.`, "green"); },
      no:  () => { print("You leave it.", "dim"); }
    };
  }
  if (e.isBoss) {
    const fd = Math.round(10 * G.fractureMult);
    G.fracture = Math.max(0, G.fracture - fd);
    blank();
    const floorName = FLOORS[curRoom().floor-1].name;
    print(`${floorName} is quiet.`);
    print("Not the quiet of something resolved.", "dim");
    print("The quiet of something that has stopped needing to make noise.", "dim");
    print(`-${fd} Fracture.`, "green");
  }
  updateStatusBar();
}

function searchRoom() {
  const r = curRoom();
  if (r.enemy && r.enemy.hp > 0) { print("You can't search properly with that in the room.", "dim"); return; }
  blank();
  print("You search the room carefully.", "dim");
  let found = false;
  if (Math.random() < 0.40) {
    const g = ri(5,18); G.scraps += g;
    print(`You find ${g} scraps — cash, coins, something left behind.`, "green"); found = true;
  }
  if (Math.random() < 0.30) {
    const sh = ri(1,4); G.shells += sh;
    print(`Shells. ${sh} of them.`, "green"); found = true;
  }
  if (Math.random() < 0.22) {
    G.bandage++;
    print("A bandage kit. Still sealed.", "green"); found = true;
  }
  if (Math.random() < 0.15) {
    G.roomService++;
    print("A room service voucher. 'Good for one use. Complimentary.'", "green"); found = true;
  }
  if (Math.random() < 0.08 && !G.gun) {
    const gun = pick(HOTEL_GUNS);
    print(`\nYou find a ${gun.name}.`);
    print(gun.desc, "dim");
    print("Take it? (y/n)", "accent");
    G.pendingConfirm = {
      yes: () => { G.gun = gun; print(`You take the ${gun.name}.`, "green"); },
      no:  () => { print("You leave it.", "dim"); }
    };
    found = true;
  }
  if (Math.random() < 0.25) {
    print(pick(ROOM_LORE), "dim");
    const f = Math.round(ri(2,6) * G.fractureMult);
    addFracture(f);
    print(`+${f} Fracture.`, "red"); found = true;
  }
  if (!found) print("Nothing useful here.", "dim");
}

function doRest() {
  const r = curRoom();
  if (r.enemy && r.enemy.hp > 0) { print("You can't rest with that in here.", "dim"); return; }
  if (G.scraps < 20) { print("You can't afford to rest. (20 scraps)", "dim"); return; }
  G.scraps -= 20;
  const heal = ri(10,18);
  G.hp = Math.min(G.maxHp, G.hp + heal);
  const frac = Math.round(ri(2,5) * G.fractureMult);
  addFracture(frac);
  blank();
  const restLines = [
    ["You sit on the edge of the bed.", "The mattress adjusts to you too quickly. Like it already knew your shape.", "When you open your eyes the room is slightly different. As if it moved a fraction closer to something it was always becoming."],
    ["You lie down.", "The ceiling is the wrong distance away.", "You sleep anyway. You dream about the corridor. In the dream you understand why.", "You wake up and immediately forget the understanding."],
    ["You sit against the wall.", "The wall is warm. It has been warm on every floor.", "You are unsuccessful at not thinking about it."],
    ["You sleep in the chair.", "Not the bed. You don't trust the bed.", "You dream about home. The dream gets the details almost right. Almost."]
  ];
  pick(restLines).forEach(l => print(l, "dim"));
  print(`+${heal} HP. +${frac} Fracture.`, G.hp < G.maxHp*0.3 ? "red" : "");
  print("(The hotel gives you rest. The hotel takes something for it.)", "dim");
}

function showGunMenu() {
  blank();
  print("=== GUN ===", "accent");
  if (G.gun) {
    print(`Equipped: ${G.gun.name}`);
    print(G.gun.desc, "dim");
    print(`Damage: ${G.gun.dmgMin}-${G.gun.dmgMax} | Shells/shot: ${G.gun.shells}`);
    print(`Shells: ${G.shells}`);
    blank();
    print("Switch:");
    HOTEL_GUNS.forEach((g,i) => print(`${i+1}. ${g.name}`));
    print(`${HOTEL_GUNS.length+1}. Unequip`);
    print("(enter number or press enter to cancel)", "dim");
    G._gunMenu = true;
  } else {
    print("No gun equipped. Find them by searching rooms.", "dim");
    print(`Shells: ${G.shells}`);
  }
}

function handleGunMenu(cmd) {
  G._gunMenu = false;
  const c = cmd.trim();
  if (!c) { print("Gun menu closed.", "dim"); return; }
  const idx = parseInt(c) - 1;
  if (idx === HOTEL_GUNS.length) { G.gun = null; print("Gun unequipped.", "dim"); }
  else if (HOTEL_GUNS[idx]) { G.gun = HOTEL_GUNS[idx]; print(`You switch to the ${G.gun.name}.`, "green"); }
  else { print("Invalid choice.", "dim"); }
  updateStatusBar();
}

// ============================================================
// WIN / LOSE
// ============================================================

function checkWinLose() {
  if (!G) return;
  if (G.currentRoom >= 70 && G.hp > 0) { checkoutEnding(); }
  else if (G.hp <= 0) { deathScreen(); }
}

function checkoutEnding() {
  G.phase = "done";
  blank();
  printSep("═");
  const lines = [
    "Room 70.",
    "",
    "The door at the end of a corridor that goes on too long.",
    "You have been walking toward it for seven days.",
    "",
    "You open it.",
    "",
    "Outside.",
    "",
    "Not the city you arrived in.",
    "Close.",
    "The proportions are slightly wrong.",
    "The sky is the right colour but the wrong shade.",
    "The sound of traffic is there but the timing is off.",
    "Like a recording of a city rather than a city.",
    "",
    "You stand on the pavement.",
    "",
    "You are not okay.",
    "",
    "You know this with the specific certainty of someone",
    "who has just spent a week learning what it feels like",
    "to not be okay, precisely, technically, completely.",
    "",
    "You don't call anyone.",
    "The words for what happened are still in the hotel.",
    "The hotel keeps them.",
    "The hotel is good at keeping things.",
    "",
    "A week from now you will be in a hospital.",
    "You will not explain how you got there.",
    "The words are still on the fourth floor."
  ];
  lines.forEach(l => print(l, "dim"));
  blank();
  printSep("═");
  print(`  ${G.name.toUpperCase()}`, "bold");
  print(`  CHECKED IN: 7 DAYS AGO`, "dim");
  print(`  ROOMS SURVIVED: ${G.roomsCleared}/70`, "dim");
  print(`  FRACTURE ON EXIT: ${G.fracture}/100`, G.fracture >= 70 ? "red" : G.fracture >= 40 ? "yellow" : "");
  blank();
  if (G.fracture === 0) {
    print("  You leave whole. The hotel has never failed to leave a mark. Check again in a few days.", "dim");
  } else if (G.fracture < 25) {
    print("  You leave mostly intact. The changes are small. Small changes accumulate.", "dim");
  } else if (G.fracture < 50) {
    print("  You leave changed. You will spend a long time thinking it was something else. It was the hotel.", "dim");
  } else if (G.fracture < 75) {
    print("  You leave fractured. Not broken. Not yet. Give it a week.", "dim");
    print("  The hospital will be clean and white and will smell like antiseptic.", "dim");
    print("  You will be grateful for something that simple.", "dim");
  } else if (G.fracture < 90) {
    print("  You barely leave. Some of you didn't make it through the door.", "dim");
    print("  The hotel holds it for you. You will not collect it.", "dim");
  } else {
    print("  You leave, technically.", "dim");
    print("  The part of you that checks out is not the part that checked in.", "dim");
    print("  The hotel has your name on two registries now.", "dim");
  }
  printSep("═");
  blank();
  print("The hotel sign flickers behind you as you walk away.", "dim");
  print("The letters rearrange.", "dim");
  print("They spell: COME BACK.", "yellow");
  print("Then: YOU WILL.", "yellow");
  blank();
  print("In the hospital, a week from now,", "dim");
  print("something beneath the building followed you here.", "dim");
  print("It found something beneath the hospital.", "dim");
  print("Something deep and old and shelved.", "dim");
  blank();
  print("D A R K   F L O O F", "accent");
  print("THE ORIGINAL GAME", "dim");
  print("THE ONE YOU HAVEN'T PLAYED YET", "dim");
  print("OR THE ONE YOU ALREADY HAVE", "dim");
  print("DEPENDING ON WHEN YOU FOUND THIS", "dim");
  blank();
  print("(type anything to return to title)", "dim");
  setupPhase = "done";
  updateStatusBar();
}

function deathScreen() {
  G.phase = "done";
  blank();
  printSep("═");
  print(`${G.name} doesn't make it out.`, "yellow");
  blank();
  print("Not killed.", "dim");
  print("", "");
  print("Kept.", "dim");
  blank();
  print("The hotel updates the registry.", "dim");
  print("Under checkout date, it writes nothing.", "dim");
  print("It has never written anything under that field for a guest it keeps.", "dim");
  blank();
  print(`Room ${G.currentRoom+1} of 70.`, "dim");
  blank();
  print("The hotel thanks you for your stay.", "dim");
  print("It genuinely does.", "dim");
  print("It just expresses gratitude differently than you're used to.", "dim");
  blank();
  print("Your room will be ready for the next guest by morning.", "dim");
  blank();
  printSep("═");
  blank();
  print("(type anything to return to title)", "dim");
  setupPhase = "done";
  updateStatusBar();
}

// ============================================================
// INPUT HANDLER
// ============================================================

const cmdInput = document.getElementById("cmd");

cmdInput.addEventListener("keydown", e => {
  if (e.key !== "Enter") return;
  const raw = cmdInput.value;
  const cmd = raw.trim();
  cmdInput.value = "";

  // Echo input
  if (cmd) print(`> ${raw}`, "dim");

  if (setupPhase === "done") {
    G = null;
    startTitle();
    return;
  }

  if (setupPhase !== "play") {
    handleSetup(raw);
    updateStatusBar();
    return;
  }

  if (!G) { startTitle(); return; }

  // Gun menu sub-input
  if (G._gunMenu) { handleGunMenu(raw); return; }

  // Item menu sub-input
  if (G._itemMenu) { handleCombatItemChoice(raw); updateStatusBar(); return; }

  handlePlay(raw);
});

// Auto-focus on click anywhere
document.addEventListener("click", () => cmdInput.focus());

// ============================================================
// BOOT
// ============================================================

startTitle();
</script>
