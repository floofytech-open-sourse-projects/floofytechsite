<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Lyd‑AI • FloofyTech</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/png" href="/favicon.png">

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0b1120;
      font-family: monospace;
      color: white;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    #bg {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
    }

    /* ── HEADER ─────────────────────────────────────────────── */
    .page-header {
      text-align: center;
      margin-bottom: 18px;
    }

    .page-header h1 {
      font-size: 22px;
      text-shadow: 0 0 10px #38bdf8;
      letter-spacing: 2px;
    }

    .page-header p {
      font-size: 12px;
      color: #38bdf8;
      opacity: 0.7;
      margin-top: 4px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 14px;
      font-size: 12px;
      color: #22c55e;
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }
    .back-link:hover { opacity: 1; }

    /* ── CHAT PANEL ─────────────────────────────────────────── */
    #panel {
      width: min(94vw, 560px);
      height: min(70vh, 540px);
      background: rgba(2, 6, 23, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.25);
      border-radius: 16px;
      box-shadow: 0 0 50px rgba(0, 0, 0, 0.7), 0 0 20px rgba(56, 189, 248, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(6px);
    }

    #panel-header {
      padding: 12px 16px;
      background: linear-gradient(135deg, #0ea5e9, #22c55e);
      color: #0f172a;
      font-weight: 700;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 15px;
      flex-shrink: 0;
    }

    #panel-header img {
      width: 26px;
      height: 26px;
      border-radius: 50%;
    }

    #panel-header .sub {
      font-size: 11px;
      font-weight: 400;
      opacity: 0.75;
    }

    #status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #0f172a;
      opacity: 0.4;
      margin-left: auto;
      flex-shrink: 0;
      transition: background 0.4s, opacity 0.4s;
    }
    #status-dot.online { background: #0f172a; opacity: 1; }

    /* ── MESSAGES ───────────────────────────────────────────── */
    #chat {
      flex: 1;
      padding: 14px 12px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 2px; }

    .msg {
      padding: 9px 12px;
      border-radius: 12px;
      max-width: 82%;
      font-size: 13px;
      line-height: 1.55;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg-user {
      align-self: flex-end;
      background: rgba(34, 197, 94, 0.13);
      border: 1px solid rgba(34, 197, 94, 0.35);
    }

    .msg-ai {
      align-self: flex-start;
      background: rgba(56, 189, 248, 0.12);
      border: 1px solid rgba(56, 189, 248, 0.35);
    }

    .msg-sys {
      align-self: center;
      font-size: 11px;
      color: #64748b;
      background: none;
      border: none;
      padding: 2px 0;
    }

    /* typing indicator */
    .typing::after {
      content: "▌";
      animation: blink 0.7s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }

    /* ── INPUT ROW ──────────────────────────────────────────── */
    #input-row {
      padding: 10px;
      border-top: 1px solid rgba(148, 163, 184, 0.2);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    #msg-input {
      flex: 1;
      padding: 9px 14px;
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      background: #0f172a;
      color: #e5e7eb;
      font-size: 13px;
      font-family: monospace;
      outline: none;
      transition: border-color 0.2s;
    }
    #msg-input:focus { border-color: #38bdf8; }

    #send-btn {
      padding: 0 18px;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, #38bdf8, #22c55e);
      color: #0f172a;
      cursor: pointer;
      font-weight: 700;
      font-size: 13px;
      font-family: monospace;
      transition: opacity 0.2s;
    }
    #send-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── FOOTER NOTE ────────────────────────────────────────── */
    .page-footer {
      margin-top: 12px;
      font-size: 11px;
      color: #334155;
      text-align: center;
    }
  </style>
</head>

<body>

<canvas id="bg"></canvas>

<a class="back-link" href="index.html">← back to portal</a>

<div class="page-header">
  <h1>🐺 Lyd‑AI</h1>
  <p>CPU-only · WASM · no server · runs in your browser</p>
</div>

<div id="panel">
  <div id="panel-header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0b/Diaspora-logo.png" alt="">
    <div>
      Lyd‑AI
      <div class="sub">FloofyTech · Qwen2.5-0.5B · CPU</div>
    </div>
    <div id="status-dot" title="Loading…"></div>
  </div>

  <div id="chat"></div>

  <div id="input-row">
    <input id="msg-input" type="text" placeholder="Ask Lyd‑AI anything…" disabled />
    <button id="send-btn" disabled>Send</button>
  </div>
</div>

<div class="page-footer">model runs locally · nothing leaves your device</div>

<!-- Transformers.js -->
<script src="https://cdn.jsdelivr.net/npm/@xenova/transformers/dist/transformers.min.js"></script>

<script>
/* ── REFS ───────────────────────────────────────────────────── */
const chatEl  = document.getElementById("chat");
const inputEl = document.getElementById("msg-input");
const sendBtn = document.getElementById("send-btn");
const dot     = document.getElementById("status-dot");

let pipe = null;
let busy = false;

const history = [
  {
    role: "system",
    content:
      "You are Lyd‑AI, the official FloofyTech husky assistant. " +
      "You run on CPU only (no GPU, no WebGPU). " +
      "You speak with chaotic husky energy but give clear, helpful answers. " +
      "You may reference FloofyTech, FloofOS, DOGPACK, Floofcell, and Dogpen."
  }
];

/* ── MESSAGES ───────────────────────────────────────────────── */
function addMsg(role, text, typing = false) {
  const div = document.createElement("div");
  div.className = "msg " + (
    role === "user"   ? "msg-user" :
    role === "ai"     ? "msg-ai" + (typing ? " typing" : "") :
    "msg-sys"
  );
  div.textContent = text;
  chatEl.appendChild(div);
  chatEl.scrollTop = chatEl.scrollHeight;
  return div;
}

/* ── MODEL INIT ─────────────────────────────────────────────── */
async function init() {
  addMsg("sys", "Downloading model… this may take a moment on first load.");
  try {
    pipe = await window.transformers.pipeline(
      "text-generation",
      "Xenova/Qwen2.5-0.5B-Instruct"
    );
    dot.classList.add("online");
    dot.title = "Online";
    inputEl.disabled = false;
    sendBtn.disabled = false;
    inputEl.focus();
    addMsg("ai", "Lyd‑AI online. Running on CPU only — no GPU, no server, nothing leaves your browser.\n\nWhat do you need, hooman? 🐾");
  } catch (e) {
    console.error(e);
    addMsg("sys", "Failed to load model. Check console.");
  }
}

/* ── PROMPT ─────────────────────────────────────────────────── */
function buildPrompt(userText) {
  const sys   = history.find(m => m.role === "system")?.content || "";
  const convo = history
    .filter(m => m.role !== "system")
    .map(m => `${m.role === "assistant" ? "Assistant" : "User"}: ${m.content}`)
    .join("\n");
  return `System: ${sys}\n${convo ? convo + "\n" : ""}User: ${userText}\nAssistant:`;
}

/* ── SEND ───────────────────────────────────────────────────── */
async function send() {
  if (!pipe || busy) return;
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = "";
  addMsg("user", text);
  busy = true;
  sendBtn.disabled = true;

  const placeholder = addMsg("ai", "", true);

  try {
    const out = await pipe(buildPrompt(text), {
      max_new_tokens: 200,
      temperature: 0.8,
      top_p: 0.9
    });

    const full  = out[0].generated_text;
    const reply = full.split("Assistant:").pop().trim();

    placeholder.classList.remove("typing");
    placeholder.textContent = reply;
    chatEl.scrollTop = chatEl.scrollHeight;

    history.push({ role: "user",      content: text  });
    history.push({ role: "assistant", content: reply });

  } catch (e) {
    console.error(e);
    placeholder.classList.remove("typing");
    placeholder.textContent = "Lyd‑AI crashed into a CPU register. Check console.";
  } finally {
    busy = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

sendBtn.onclick = send;
inputEl.onkeydown = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); } };

init();

/* ── BACKGROUND ─────────────────────────────────────────────── */
const canvas = document.getElementById("bg");
const ctx    = canvas.getContext("2d");

function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
resize();
window.addEventListener("resize", resize);

let offset = 0;
const colors       = ["#0ea5e9","#22c55e","#0ea5e9","#6366f1"];
const cycleDuration = 90000;

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1),16), bh = parseInt(b.slice(1),16);
  const ar=(ah>>16)&0xff, ag=(ah>>8)&0xff, ab=ah&0xff;
  const br=(bh>>16)&0xff, bg=(bh>>8)&0xff, bb=bh&0xff;
  return `rgb(${Math.round(ar+(br-ar)*t)},${Math.round(ag+(bg-ag)*t)},${Math.round(ab+(bb-ab)*t)})`;
}

function getColor() {
  const now = Date.now() % cycleDuration;
  const t   = now / cycleDuration * colors.length;
  const i   = Math.floor(t);
  return lerpColor(colors[i], colors[(i+1)%colors.length], t-i);
}

function draw() {
  ctx.fillStyle = "rgba(0,0,0,0.3)";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  const c = getColor();
  ctx.strokeStyle = c;
  ctx.shadowColor  = c;
  ctx.shadowBlur   = 0;
  ctx.lineWidth    = 1;
  ctx.globalAlpha  = 0.18;

  const sp = 50;
  offset += 0.4;

  for (let x = -sp; x < canvas.width + sp; x += sp) {
    ctx.beginPath();
    ctx.moveTo(x + (offset % sp), 0);
    ctx.lineTo(x + (offset % sp), canvas.height);
    ctx.stroke();
  }
  for (let y = -sp; y < canvas.height + sp; y += sp) {
    ctx.beginPath();
    ctx.moveTo(0, y + (offset % sp));
    ctx.lineTo(canvas.width, y + (offset % sp));
    ctx.stroke();
  }

  ctx.globalAlpha = 1;
  requestAnimationFrame(draw);
}
draw();
</script>

</body>
</html>
