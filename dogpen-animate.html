<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dogpen Animate</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; }
        header { background: white; border-bottom: 3px solid #e74c3c; padding: 1.5rem 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .header-content { max-width: 1400px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .logo { font-size: 1.5rem; font-weight: 800; }
        .btn { background: #e74c3c; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 6px; cursor: pointer; margin: 0 0.25rem; font-size: 0.85rem; font-weight: 600; }
        .btn:hover { background: #c0392b; }
        .btn-secondary { background: #3498db; }
        .btn-secondary:hover { background: #2980b9; }
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; }
        .editor { background: white; border-radius: 12px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 2rem; }
        .toolbar { margin-bottom: 1.5rem; display: flex; gap: 0.5rem; flex-wrap: wrap; }
        .toolbar-btn { background: #f0f0f0; border: 1px solid #ddd; padding: 0.6rem 1rem; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .toolbar-btn:hover { background: #e74c3c; color: white; }
        .theme-selector { display: flex; gap: 0.5rem; }
        .theme-btn { padding: 0.5rem 1rem; border: 2px solid #ddd; background: white; border-radius: 4px; cursor: pointer; font-size: 0.85rem; }
        .theme-btn.active { border-color: #e74c3c; background: #fff3e0; }
        .slide-editor { border: 2px solid #ddd; border-radius: 8px; padding: 2rem; background: #f9f9f9; margin-bottom: 1.5rem; min-height: 400px; position: relative; }
        .slide-editor.blue { background: linear-gradient(135deg, #3498db 0%, #2980b9 100%); color: white; }
        .slide-editor.red { background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%); color: white; }
        .slide-editor.green { background: linear-gradient(135deg, #27ae60 0%, #229954 100%); color: white; }
        .slide-editor.purple { background: linear-gradient(135deg, #9b59b6 0%, #8e44ad 100%); color: white; }
        .slide-title-input { font-size: 2rem; font-weight: bold; border: none; background: transparent; color: inherit; width: 100%; margin-bottom: 2rem; padding: 1rem 0; }
        .slide-title-input::placeholder { color: rgba(255,255,255,0.7); }
        .slide-content-input { font-size: 1.1rem; border: none; background: transparent; color: inherit; width: 100%; min-height: 250px; padding: 1rem; }
        .slide-content-input::placeholder { color: rgba(255,255,255,0.7); }
        .slide-counter { position: absolute; top: 1rem; right: 1rem; color: inherit; opacity: 0.8; }
        .controls { margin-top: 2rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem; }
        .nav-buttons { display: flex; gap: 0.5rem; }
        .slideshow-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 1000; }
        .slide { display: none; width: 100%; height: 100%; padding: 4rem; box-sizing: border-box; }
        .slide.active { display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .slide-title { font-size: 3rem; font-weight: bold; margin-bottom: 2rem; }
        .slide-content { font-size: 1.5rem; line-height: 1.8; }
        .close-slideshow { position: absolute; top: 1rem; right: 2rem; color: white; font-size: 2rem; cursor: pointer; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <a href="dogpen-home.html" class="logo" style="text-decoration: none; color: inherit;">🎬 Dogpen Animate</a>
            <div>
                <button class="btn btn-secondary" onclick="startPresentation()">🎬 Present</button>
                <button class="btn" onclick="createNewSlide()">➕ New Slide</button>
                <button class="btn" onclick="deleteCurrentSlide()" style="background:#e74c3c;">🗑️ Delete</button>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="editor">
            <div class="toolbar">
                <button class="toolbar-btn" onclick="insertText('## Heading')">H2</button>
                <button class="toolbar-btn" onclick="insertText('**Bold**')">Bold</button>
                <button class="toolbar-btn" onclick="insertText('*Italic*')">Italic</button>
                <button class="toolbar-btn" onclick="insertText('• Bullet')">Bullet</button>
            </div>

            <div class="toolbar" style="border-bottom: 1px solid #ddd; padding-bottom: 1rem; margin-bottom: 1rem;">
                <span style="margin-right: 1rem; font-weight: 600;">Themes:</span>
                <button class="theme-btn active" onclick="setTheme('blue')">Blue</button>
                <button class="theme-btn" onclick="setTheme('red')">Red</button>
                <button class="theme-btn" onclick="setTheme('green')">Green</button>
                <button class="theme-btn" onclick="setTheme('purple')">Purple</button>
            </div>

            <div class="slide-editor blue" id="slideEditor">
                <div class="slide-counter"><span id="slideNum">1</span> / <span id="totalSlides">1</span></div>
                <input type="text" id="slideTitle" class="slide-title-input" placeholder="Slide Title">
                <textarea id="slideContent" class="slide-content-input" placeholder="Slide content..."></textarea>
            </div>

            <div class="controls">
                <div style="display: flex; gap: 0.5rem;">
                    <button class="btn" onclick="prevSlide()">← Previous</button>
                    <button class="btn" onclick="nextSlide()">Next →</button>
                </div>
                <button class="btn" onclick="saveCurrentSlide()">💾 Save</button>
            </div>
        </div>
    </div>

    <div class="slideshow-view" id="slideshowView">
        <span class="close-slideshow" onclick="endPresentation()">✕</span>
        <div id="slidesContainer"></div>
    </div>

    <script>
        let slides = JSON.parse(localStorage.getItem('dogpen_slides') || '[{"title":"Welcome","content":"Dogpen Animate","theme":"blue"},{"title":"Slide 2","content":"Your content here","theme":"blue"}]');
        let currentSlide = 0;
        let currentTheme = 'blue';

        function renderSlides() {
            document.getElementById('totalSlides').textContent = slides.length;
            document.getElementById('slideNum').textContent = currentSlide + 1;
            document.getElementById('slideTitle').value = slides[currentSlide].title;
            document.getElementById('slideContent').value = slides[currentSlide].content;
            currentTheme = slides[currentSlide].theme || 'blue';
            document.getElementById('slideEditor').className = 'slide-editor ' + currentTheme;
            
            // Update theme buttons
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`.theme-btn[onclick="setTheme('${currentTheme}')"]`).classList.add('active');
        }

        function saveCurrentSlide() {
            slides[currentSlide].title = document.getElementById('slideTitle').value;
            slides[currentSlide].content = document.getElementById('slideContent').value;
            slides[currentSlide].theme = currentTheme;
            localStorage.setItem('dogpen_slides', JSON.stringify(slides));
            alert('✅ Slide saved!');
        }

        function createNewSlide() {
            slides.push({ title: 'New Slide', content: 'Add content...', theme: currentTheme });
            currentSlide = slides.length - 1;
            saveCurrentSlide();
            renderSlides();
        }

        function deleteCurrentSlide() {
            if (slides.length <= 1 || !confirm('Delete this slide?')) return;
            slides.splice(currentSlide, 1);
            currentSlide = Math.max(0, currentSlide - 1);
            saveCurrentSlide();
            renderSlides();
        }

        function nextSlide() {
            saveCurrentSlide();
            if (currentSlide < slides.length - 1) {
                currentSlide++;
                renderSlides();
            }
        }

        function prevSlide() {
            saveCurrentSlide();
            if (currentSlide > 0) {
                currentSlide--;
                renderSlides();
            }
        }

        function setTheme(theme) {
            currentTheme = theme;
            document.getElementById('slideEditor').className = 'slide-editor ' + theme;
            document.querySelectorAll('.theme-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }

        function insertText(text) {
            const ta = document.getElementById('slideContent');
            const start = ta.selectionStart;
            ta.value = ta.value.substring(0, start) + text + ta.value.substring(start);
        }

        function startPresentation() {
            saveCurrentSlide();
            const container = document.getElementById('slidesContainer');
            container.innerHTML = '';
            
            slides.forEach((slide, idx) => {
                const slideDiv = document.createElement('div');
                slideDiv.className = 'slide ' + slide.theme + (idx === 0 ? ' active' : '');
                slideDiv.innerHTML = `<div class="slide-title">${slide.title}</div><div class="slide-content">${slide.content}</div>`;
                container.appendChild(slideDiv);
            });
            
            document.getElementById('slideshowView').style.display = 'flex';
            document.addEventListener('keydown', handleSlideshowKeys);
        }

        function endPresentation() {
            document.getElementById('slideshowView').style.display = 'none';
            document.removeEventListener('keydown', handleSlideshowKeys);
        }

        function handleSlideshowKeys(e) {
            const slides = document.querySelectorAll('.slide');
            if (e.key === 'ArrowRight' || e.key === ' ') {
                let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
                if (idx < slides.length - 1) {
                    slides[idx].classList.remove('active');
                    slides[idx + 1].classList.add('active');
                }
            } else if (e.key === 'ArrowLeft') {
                let idx = Array.from(slides).findIndex(s => s.classList.contains('active'));
                if (idx > 0) {
                    slides[idx].classList.remove('active');
                    slides[idx - 1].classList.add('active');
                }
            } else if (e.key === 'Escape') {
                endPresentation();
            }
        }

        renderSlides();
    </script>
</body>
</html>
