<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>FloofyTech Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* Animated gradient background */
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      font-family: Arial, sans-serif;
      color: white;
      background: linear-gradient(135deg, #0a0f24, #1b2a4a, #0d1b2a, #162447);
      background-size: 400% 400%;
      animation: gradientShift 12s ease infinite;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    h1 {
      margin-bottom: 2rem;
      font-size: 2.2rem;
      text-shadow: 0 0 15px #00c8ff;
    }

    .buttons {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      width: 260px;
    }

    a {
      display: block;
      padding: 1rem;
      text-align: center;
      text-decoration: none;
      color: white;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid rgba(255, 255, 255, 0.2);
      border-radius: 12px;
      font-size: 1.1rem;
      backdrop-filter: blur(6px);
      transition: 0.2s;
    }

    a:hover {
      background: rgba(0, 0, 0, 0.55);
      border-color: #00c8ff;
      box-shadow: 0 0 20px #00c8ff;
      transform: translateY(-3px);
    }
  </style>
</head>
<body>

  <h1>FloofyTech Portal</h1>

  <div class="buttons">
    <!-- Button 1: Google Sites -->
    <a href="https://sites.google.com/view/floofytech-webportal" target="_blank">
      Sites
    </a>

    <!-- Button 2: Husky / Minigun / Mayhem -->
    <a href="husky-minigun-mayhem.html">
      Husky / Minigun / Mayhem
    </a>
  </div>

</body>
</html>
