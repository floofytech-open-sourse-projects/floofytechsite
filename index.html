/* BACKGROUND */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background:#000;
}

h1{
  margin-bottom:30px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(2, 200px);
  gap:15px;
  justify-content:center;
}

a{
  display:block;
  padding:15px;
  background:#222;
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.2s;
}

a:hover{
  background:#444;
  transform:scale(1.05);
}
</style>
