<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FloofyTech Portal</title>

<style>
body{
  margin:0;
  font-family:monospace;
  color:white;
  overflow:hidden;
}

/* BACKGROUND */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
  background:#000;
}

/* CONTENT */
.container{
  position:relative;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
}

h1{
  margin-bottom:10px;
  text-shadow:0 0 10px #0ff;
}

.warning{
  color:#ff4444;
  margin-bottom:25px;
  font-size:14px;
}

/* FIXED GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(3, 200px); /* 3 columns so 6 buttons fit cleanly */
  gap:15px;
  justify-content:center;
  margin-bottom:25px;
}

a{
  display:block;
  padding:15px;
  background:rgba(20,20,20,0.85);
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.2s;
  backdrop-filter:blur(4px);
}

a:hover{
  background:#0ff;
  color:black;
  transform:scale(1.08);
}

.main-site{
  display:inline-block;
  padding:15px 25px;
  background:#550000;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.main-site:hover{
  background:#ff0000;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
  <h1>FloofyTech Portal</h1>
  <div class="warning">⚠ site UNSTABLE</div>

  <div class="grid">
    <a href="a-a-a-test.html">A A A Test</a>
    <a href="dark-floof2.html">Dark Floof 2</a>
    <a href="darkfloof.html">Dark Floof</a>
    <a href="husky-minigun-mayham.html">Husky Minigun Mayhem</a>
    <a href="neongrid.html">Neon Grid</a>
    <a href="wall.html">Wall</a>
  </div>

  <a class="main-site" href="https://sites.google.com/view/floofytech-webportal" target="_blank">
    Go to Main Site (UNSTABLE)
  </a>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let offset = 0;

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.strokeStyle = "#00ffff";
  ctx.lineWidth = 1;

  const spacing = 40;
  offset += 0.5;

  for(let x=-spacing; x<canvas.width+spacing; x+=spacing){
    ctx.beginPath();
    ctx.moveTo(x + (offset % spacing), 0);
    ctx.lineTo(x + (offset % spacing), canvas.height);
    ctx.stroke();
  }

  for(let y=-spacing; y<canvas.height+spacing; y+=spacing){
    ctx.beginPath();
    ctx.moveTo(0, y + (offset % spacing));
    ctx.lineTo(canvas.width, y + (offset % spacing));
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(0,255,255,0.05)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
