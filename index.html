<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FloofyTech Portal</title>

<style>
body{
  margin:0;
  font-family:monospace;
  color:white;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#5b2f3f;
  position:relative;
}

/* BACKGROUND CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CONTENT */
.container{
  text-align:center;
}

h1{
  margin-bottom:10px;
  text-shadow:0 0 10px #0ff;
}

.warning{
  color:#00ff65;
  margin-bottom:25px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:15px;
  justify-content:center;
  max-width:650px; /* keeps buttons centered in container */
  margin:0 auto 25px auto;
}

a{
  display:block;
  padding:15px;
  background:rgba(20,20,20,0.85);
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.2s;
  backdrop-filter:blur(4px);
  text-align:center;
}

a:hover{
  background:#0ff;
  color:black;
  transform:scale(1.08);
}

.main-site{
  display:inline-block;
  padding:15px 25px;
  background:#550000;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.main-site:hover{
  background:#ff0000;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">
  <h1>welcome to the FloofyTech webportal :)</h1>
  <div class="warning">JUST HAVE FUN !</div>

  <div class="grid">
    <a href="a-a-a-test.html">A A A Test</a>
    <a href="dark-floof2.html">Dark Floof 2</a>
    <a href="darkfloof.html">Dark Floof</a>
    <a href="husky-minigun-mayham.html">Husky Minigun Mayhem</a>
    <a href="neongrid.html">Neon Grid</a>
    <a href="wall.html">Wall</a>
    <a href="numasfuk-interpreter.html">NUMASFUK Interpreter</a>
    <a href="https://archive.org/details/floof-os" target="_blank">Install FloofOS</a>
  </div>

  <a class="main-site" href="https://sites.google.com/view/floofytech-webportal" target="_blank">
    Go to Main Site (UNSTABLE)
  </a>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let offset = 0;

// colors to fade through
const colors = ["#800080", "#0b2f0f", "#0000ff", "#ff8000"]; // purple → dark green → blue → orange
const cycleDuration = 120000; // 2 minutes in ms

function lerpColor(a, b, t) {
  // linear interpolation between two hex colors
  const ah = parseInt(a.slice(1), 16),
        bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff,
        ag = (ah >> 8) & 0xff,
        ab = ah & 0xff;
  const br = (bh >> 16) & 0xff,
        bg = (bh >> 8) & 0xff,
        bb = bh & 0xff;
  const rr = Math.round(ar + (br-ar)*t);
  const rg = Math.round(ag + (bg-ag)*t);
  const rb = Math.round(ab + (bb-ab)*t);
  return `rgb(${rr},${rg},${rb})`;
}

function getCurrentColor() {
  const now = Date.now() % cycleDuration;
  const t = now / cycleDuration * colors.length;
  const index = Math.floor(t);
  const nextIndex = (index + 1) % colors.length;
  return lerpColor(colors[index], colors[nextIndex], t - index);
}

function draw(){
  // fade previous frame
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // grid lines with dynamic color
  ctx.lineWidth = 2;
  const currentColor = getCurrentColor();
  ctx.strokeStyle = currentColor;
  ctx.shadowColor = currentColor;
  ctx.shadowBlur = 5;

  const spacing = 40;
  offset += 0.5;

  for(let x=-spacing; x<canvas.width+spacing; x+=spacing){
    ctx.beginPath();
    ctx.moveTo(x + (offset % spacing), 0);
    ctx.lineTo(x + (offset % spacing), canvas.height);
    ctx.stroke();
  }

  for(let y=-spacing; y<canvas.height+spacing; y+=spacing){
    ctx.beginPath();
    ctx.moveTo(0, y + (offset % spacing));
    ctx.lineTo(canvas.width, y + (offset % spacing));
    ctx.stroke();
  }

  // faint overlay for subtle glow
  ctx.fillStyle = "rgba(0,255,255,0.02)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
