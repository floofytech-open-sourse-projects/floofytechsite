<style>
body{
  margin:0;
  font-family:monospace;
  color:white;
  overflow:hidden;

  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background:#5b2f3f;
  position:relative;

  opacity:0;
  transition:opacity 0.5s ease;
}

body.loaded{
  opacity:1;
}

/* BACKGROUND CANVAS */
#bg{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  z-index:-1;
}

/* CONTENT */
.container{
  text-align:center;
  max-width:800px;
  width:100%;
}

h1{
  margin-bottom:10px;
  text-shadow:0 0 10px #0ff;
}

.warning{
  color:#01ff65;
  margin-bottom:25px;
  font-size:14px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(200px, 1fr));
  gap:15px;
  justify-content:center;
  max-width:650px;
  margin:0 auto 25px auto;
}

/* BUTTONS + SHIMMER */
.grid a{
  display:block;
  padding:15px;
  background:rgba(20,20,20,0.85);
  border-radius:10px;
  text-decoration:none;
  color:white;
  transition:0.2s;
  backdrop-filter:blur(4px);
  text-align:center;
  position:relative;
  overflow:hidden;
}

.grid a:hover{
  background:#0ff;
  color:black;
  transform:scale(1.03);
}

/* shimmer corners */
.grid a::before, .grid a::after{
  content:"";
  position:absolute;
  width:12px;
  height:12px;
  background:linear-gradient(45deg, rgba(255,255,255,0.6), rgba(0,255,255,0.8));
  opacity:0;
  transition:opacity 0.3s;
  pointer-events:none;
  filter:blur(1px);
}

.grid a::before{
  top:0;
  left:0;
  border-radius:0 0 10px 0;
}

.grid a::after{
  bottom:0;
  right:0;
  border-radius:10px 0 0 0;
}

.grid a:hover::before,
.grid a:hover::after{
  opacity:1;
}

.main-site{
  display:inline-block;
  padding:15px 25px;
  background:#550000;
  border-radius:10px;
  text-decoration:none;
  color:white;
  font-weight:bold;
}

.main-site:hover{
  background:#ff0000;
}

/* FOOTNOTE */

  font-size:12px;
  opacity:0.7;
  color:#0ff;
  text-shadow:0 0 5px #0ff;
  font-family:monospace;
  cursor:pointer;
}

<script>
window.onload = () => document.body.classList.add("loaded");

const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

function resize(){
  canvas.width = innerWidth;
  canvas.height = innerHeight;
}
resize();
window.addEventListener("resize", resize);

let offset = 0;

const colors = ["#800080", "#0b2f0f", "#0000ff", "#ff8000"];
const cycleDuration = 120000;

function lerpColor(a, b, t) {
  const ah = parseInt(a.slice(1), 16),
        bh = parseInt(b.slice(1), 16);
  const ar = (ah >> 16) & 0xff,
        ag = (ah >> 8) & 0xff,
        ab = ah & 0xff;
  const br = (bh >> 16) & 0xff,
        bg = (bh >> 8) & 0xff,
        bb = bh & 0xff;
  const rr = Math.round(ar + (br-ar)*t);
  const rg = Math.round(ag + (bg-ag)*t);
  const rb = Math.round(ab + (bb-ab)*t);
  return `rgb(${rr},${rg},${rb})`;
}

function getCurrentColor() {
  const now = Date.now() % cycleDuration;
  const t = now / cycleDuration * colors.length;
  const index = Math.floor(t);
  const nextIndex = (index + 1) % colors.length;
  return lerpColor(colors[index], colors[nextIndex], t - index);
}

function draw(){
  ctx.fillStyle = "rgba(0,0,0,0.25)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.lineWidth = 2;
  const currentColor = getCurrentColor();
  ctx.strokeStyle = currentColor;
  ctx.shadowColor = currentColor;
  ctx.shadowBlur = 0;

  const spacing = 40;
  offset += 0.5;

  for(let x=-spacing; x<canvas.width+spacing; x+=spacing){
    ctx.beginPath();
    ctx.moveTo(x + (offset % spacing), 0);
    ctx.lineTo(x + (offset % spacing), canvas.height);
    ctx.stroke();
  }

  for(let y=-spacing; y<canvas.height+spacing; y+=spacing){
    ctx.beginPath();
    ctx.moveTo(0, y + (offset % spacing));
    ctx.lineTo(canvas.width, y + (offset % spacing));
    ctx.stroke();
  }

  ctx.fillStyle = "rgba(0,255,255,0.02)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  requestAnimationFrame(draw);
}

draw();

/* SCHOOL SAFE MODE */
function schoolSafeMode(){
  document.body.innerHTML = `
    <div style="text-align:center; padding:40px; font-family:monospace; color:white;">
      <h1 style="text-shadow:0 0 10px #0ff;">FloofyTech (School-Safe Mode)</h1>
      <p style="color:#01ff65;">Some features were blocked, so we switched to a safe version.</p>

      <div style="margin-top:30px; display:flex; flex-direction:column; gap:15px;">
        <a href="darkfloof.html" style="color:#0ff;">Dark Floof</a>
        <a href="wall.html" style="color:#0ff;">Wall</a>
        <a href="neongrid.html" style="color:#0ff;">Neon Grid</a>
        <a href="numasfuk-interpreter.html" style="color:#0ff;">NUMASFUK Interpreter</a>
      </div>

      <p style="margin-top:40px; font-size:12px; opacity:0.7;">
        Canvas, animations, and external links disabled for safety.
      </p>
    </div>
  `;
}

let safeModeActive = false;

document.addEventListener("keydown", (e) => {
  if (e.key.toLowerCase() === "y") {
    if (!safeModeActive) {
      safeModeActive = true;
      schoolSafeMode();
    } else {
      safeModeActive = false;
      location.reload();
    }
  }
});

/* AUTO SAFE MODE */
setTimeout(() => {
  if (!canvas.getContext) schoolSafeMode();

  try{
    if (window.top !== window.self) schoolSafeMode();
  }catch(e){
    schoolSafeMode();
  }
}, 300);


/* --- LYDIA FANCLUB PERSISTENT TOKEN --- */
const foot = document.getElementById("lydia-foot");

// If token exists, show membership status
if (localStorage.getItem("lydiaFanclub") === "member") {
  foot.textContent = "Lydia fanclub member";
}

// Click to join
foot.addEventListener("click", () => {
  localStorage.setItem("lydiaFanclub", "member");
  foot.textContent = "thanks for joining";

  // glow pulse
  foot.style.textShadow = "0 0 12px #0ff";

  setTimeout(() => {
    foot.textContent = "Lydia fanclub member";
    foot.style.textShadow = "0 0 5px #0ff";
  }, 2000);
});
</script>
