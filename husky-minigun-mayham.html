<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Husky Minigun Mayhem</title>
<style>
  body { margin: 0; overflow: hidden; background: #111; }
  canvas { display: block; background: #222; }
  #hud {
    position: absolute; top: 10px; left: 10px; color: white;
    font-family: monospace; font-size: 18px;
  }
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="hud"></div>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const hud = document.getElementById('hud');

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// Player (Husky)
const player = {
  x: canvas.width/2,
  y: canvas.height/2,
  size: 40,
  speed: 5,
  angle: 0,
  health: 100,
};

// Bullets
let bullets = [];
const bulletSpeed = 12;
let shootCooldown = 0;

// Enemies
let enemies = [];
const enemySpeed = 2;
let spawnCooldown = 0;

// Power-ups
let powerUps = [];

// Mouse
let mouse = { x: 0, y: 0 };
let shooting = false;

// Controls
const keys = {};
document.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
document.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
});

canvas.addEventListener('mousedown', () => shooting = true);
canvas.addEventListener('mouseup', () => shooting = false);

// Game variables
let score = 0;

// Game Loop
function update() {
  // Move player
  if(keys['w']) player.y -= player.speed;
  if(keys['s']) player.y += player.speed;
  if(keys['a']) player.x -= player.speed;
  if(keys['d']) player.x += player.speed;

  // Keep player in bounds
  player.x = Math.max(player.size/2, Math.min(canvas.width - player.size/2, player.x));
  player.y = Math.max(player.size/2, Math.min(canvas.height - player.size/2, player.y));

  // Angle to mouse
  player.angle = Math.atan2(mouse.y - player.y, mouse.x - player.x);

  // Shooting
  if(shooting && shootCooldown <= 0) {
    bullets.push({
      x: player.x + Math.cos(player.angle)*player.size/2,
      y: player.y + Math.sin(player.angle)*player.size/2,
      dx: Math.cos(player.angle)*bulletSpeed,
      dy: Math.sin(player.angle)*bulletSpeed
    });
    shootCooldown = 5; // frames between bullets
  }
  if(shootCooldown > 0) shootCooldown--;

  // Update bullets
  bullets.forEach((b, i) => {
    b.x += b.dx;
    b.y += b.dy;
    if(b.x < 0 || b.x > canvas.width || b.y < 0 || b.y > canvas.height) bullets.splice(i, 1);
  });

  // Spawn enemies
  if(spawnCooldown <= 0) {
    const edge = Math.floor(Math.random()*4);
    let x, y;
    if(edge === 0) { x = 0; y = Math.random()*canvas.height; }
    if(edge === 1) { x = canvas.width; y = Math.random()*canvas.height; }
    if(edge === 2) { x = Math.random()*canvas.width; y = 0; }
    if(edge === 3) { x = Math.random()*canvas.width; y = canvas.height; }
    enemies.push({ x, y, size: 30, health: 20 });
    spawnCooldown = 60 - Math.min(score/10, 50); // faster spawn as score increases
  } else spawnCooldown--;

  // Update enemies
  enemies.forEach((e, i) => {
    const dx = player.x - e.x;
    const dy = player.y - e.y;
    const dist = Math.hypot(dx, dy);
    e.x += dx/dist * enemySpeed;
    e.y += dy/dist * enemySpeed;

    // Check collision with player
    if(dist < (e.size/2 + player.size/2)) {
      player.health -= 0.5;
      e.health = 0;
    }

    // Check collision with bullets
    bullets.forEach((b, j) => {
      const d = Math.hypot(b.x - e.x, b.y - e.y);
      if(d < e.size/2) {
        e.health -= 10;
        bullets.splice(j, 1);
        if(e.health <= 0) {
          score += 10;
          // chance to drop power-up
          if(Math.random() < 0.1) {
            powerUps.push({
              x: e.x,
              y: e.y,
              size: 20,
              type: 'health'
            });
          }
        }
      }
    });

    if(e.health <= 0) enemies.splice(i, 1);
  });

  // Update power-ups
  powerUps.forEach((p, i) => {
    const d = Math.hypot(player.x - p.x, player.y - p.y);
    if(d < (player.size/2 + p.size/2)) {
      if(p.type === 'health') player.health = Math.min(100, player.health+20);
      powerUps.splice(i,1);
    }
  });

  // Game Over
  if(player.health <= 0) {
    alert('Game Over! Score: ' + score);
    location.reload();
  }

  draw();
  requestAnimationFrame(update);
}

// Draw everything
function draw() {
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Draw player (husky as circle)
  ctx.save();
  ctx.translate(player.x, player.y);
  ctx.rotate(player.angle);
  ctx.fillStyle = 'white';
  ctx.beginPath();
  ctx.arc(0, 0, player.size/2, 0, Math.PI*2);
  ctx.fill();
  // Minigun barrel
  ctx.fillStyle = 'gray';
  ctx.fillRect(0, -5, player.size, 10);
  ctx.restore();

  // Draw bullets
  ctx.fillStyle = 'yellow';
  bullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 5, 0, Math.PI*2);
    ctx.fill();
  });

  // Draw enemies
  enemies.forEach(e => {
    ctx.fillStyle = 'red';
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.size/2, 0, Math.PI*2);
    ctx.fill();
  });

  // Draw power-ups
  powerUps.forEach(p => {
    ctx.fillStyle = 'green';
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size/2, 0, Math.PI*2);
    ctx.fill();
  });

  // Draw HUD
  hud.innerHTML = `Health: ${Math.floor(player.health)}<br>Score: ${score}`;
}

// Start the game
update();
</script>
</body>
</html>
