// ── UTILITY ──────────────────────────────────────────────────────────────────
function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function hn(){return G?G.huskyName:"you";}

const outEl=document.getElementById("output");
function p(text,cls){
  String(text).split("\n").forEach(l=>{
    const d=document.createElement("div");
    d.className="line"+(cls?" "+cls:"");
    d.textContent=l;
    outEl.appendChild(d);
  });
  outEl.scrollTop=outEl.scrollHeight;
}
function bl(){p("");}
function sp(ch,n){p((ch||"─").repeat(n||55),"dim");}

  G.rooms=[];
  const fids=shuffle(FOLLOWERS.map(f=>f.id));
  const gnames=shuffle(GUNS.map(g=>g.name));
  let fi=0,gi=0;
  FLOORS.forEach((fl,idx)=>{
    for(let r=0;r<10;r++){
      const isBoss=(r===9);
      const theme=fl.theme;
      const name=isBoss?BOSS_NAMES[idx]+"'s Domain":RNAMES[theme][r%RNAMES[theme].length];
      const desc=isBoss?fl.desc:pick(RDESCS[theme]);
      const lore=Math.random()<0.55?pick(RLORE):null;
      const room={num:G.rooms.length+1,name,desc,lore,floor:idx+1,theme,isBoss,visited:false,enemy:null,flags:{},follower:null,gunOnFloor:null};
      if(isBoss){room.enemy=mkBoss(idx);}
      else if(Math.random()<G.er){room.enemy=mkEnemy(theme);}
      if(!isBoss&&fi<fids.length&&Math.random()<0.28){room.follower=fids[fi++];}
      if(!isBoss&&gi<gnames.length&&Math.random()<0.18){room.gunOnFloor=gnames[gi++];}
      G.rooms.push(room);
    }
  });
}

function mkEnemy(theme){
  const pool=ENEMY_POOL[theme]||ENEMY_POOL.lobby;
  const e=pick(pool);
  return {name:e.name,hp:ri(e.hp[0],e.hp[1]),maxHp:0,atk:ri(e.atk[0],e.atk[1]),def:ri(e.def[0],e.def[1]),spd:10,desc:e.desc,isBoss:false,se:{},phase:1};
}
function mkBoss(fi){
  const hp=35+fi*15+ri(10,20);
  return {name:BOSS_NAMES[fi],hp,maxHp:hp,atk:11+fi*2+ri(2,5),def:5+fi,spd:12,desc:BOSS_DESCS[fi],isBoss:true,se:{},phase:1};
}
function cur(){return G.rooms[G.currentRoom];}

  } else if(phase==="about"){startTitle();}

  } else if(phase==="cname"){
    G={_pc:raw.trim()||"Counsel"};

    bl();p(`The case of COMMONWEALTH v. THE CLIENT.`);bl();

    p(`The prosecution looks at ${hn2} for a long time.`,"dim");p("They write something down. They do not say what.","dim");bl();
    p("Charges:","accent");charges.forEach((c2,i)=>p(`  ${i+1}. ${c2}`));bl();

    phase="argstyle";
  } else if(phase==="argstyle"){
    const style=c==="1"?"aggressive":c==="2"?"defensive":"quiet";
    bl();
    const msgs={aggressive:[`${G._hn} will fight every objection.`,"This building has seen that approach before. It has prepared."],defensive:[`${G._hn} will absorb what comes.`,"The courthouse knows this. It will use it."],quiet:[`${G._hn} will look for what the building doesn't want found.`,"The building has had this conversation before."]};

function showStatusFull(){

  const r=cur();

function dreadDesc(){
  const b=Math.min(5,Math.floor(G.dread/20));
  const msg=DREAD_DESCS[b];
  if(msg) p(msg.replace(/you/g,G.huskyName),"dim");
}

function describeRoom(forceLore){
  if(!G)return;
  const r=cur();if(!r)return;
  bl();
  p(`[${FLOORS[r.floor-1].name} — Room ${r.num}]`,"dim");
  p(r.isBoss?`=== ${r.name} ===`:r.name,"white");
  p(r.desc);
  if(r.lore&&(!r.visited||forceLore)) p(r.lore,"dim");
  r.visited=true;
  dreadDesc();
  // Horror intrusion
  if(!r.flags.horrorFired&&G.dread>=30){
    r.flags.horrorFired=true;
    const pool=G.dread>=70?HORROR.slice(-8):G.dread>=50?HORROR.slice(6):HORROR.slice(0,6);
    if(pool.length){bl();p(pick(pool),"dim");}
  }
  // Follower
  if(r.follower&&!r.flags.followerMet){
    r.flags.followerMet=true;
    const ft=FOLLOWERS.find(f=>f.id===r.follower);
    if(ft&&!G.followersFound.includes(ft.id)){
      bl();p(ft.foundDesc,"dim");bl();p(ft.foundLine,"dim");bl();
      p("Join you? (y/n)","accent");
      G._confirm={
        yes:()=>{
          G.followersFound.push(ft.id);
          const m={id:ft.id,name:ft.name,role:ft.role,hp:ft.hp,maxHp:ft.hp,atk:ft.atk,def:ft.def,spd:ft.spd,
            skills:ft.skills,limitName:ft.limitName,limitReady:false,se:{},
            gName:ft.gunName,gMin:ft.gunDmgMin||0,gMax:ft.gunDmgMax||0,gCost:ft.gunCost||1,gShells:ri(2,5)};
          G.party.push(m);p(`${ft.name} joins your party.`,"green");
          if(m.gName) p(`They are carrying a ${m.gName}.`,"dim");
        },
        no:()=>p("They watch you leave. They do not say anything. The building does.","dim")
      };
      return;
    }
  }
  // Gun on floor
  if(r.gunOnFloor&&!r.flags.gunTaken){
    bl();p(`A ${r.gunOnFloor} is on the floor.`,"accent");
    p("It was not there a moment ago. Or it was and the room arranged itself around it.","dim");
    p("(Type TAKE GUN to pick it up.)","dim");
  }
  // Enemy
  bl();
  if(r.enemy&&r.enemy.hp>0){
    if(r.isBoss){p(r.enemy.name,"yellow");p(r.enemy.desc,"dim");p(`"${pick(BOSS_LINES[r.floor-1])}"`,"dim");p("(It will not let you pass.)","dim");}
    else{p(`${r.enemy.name} is here.`,"yellow");p(r.enemy.desc,"dim");}
    if(!r.flags.combatTriggered){
      r.flags.combatTriggered=true;
      p(`It has already noticed ${G.huskyName}.`,"dim");p("The building told it someone was coming.","dim");
      startCombat(r.enemy);return;
    }
  } else {
    p("(The room is clear. Type NEXT to advance.)","dim");
  }
}

function doPlay(raw){
  if(!G||G.done)return;
  const c=raw.trim().toLowerCase();
  if(G._confirm){const cf=G._confirm;G._confirm=null;(c==="y"||c==="yes")?cf.yes():cf.no();updBar();return;}
  if(G._sub){doSub(raw);return;}
  if(G._inCombat){doCombat(raw);return;}
  if(c==="fkill"){const r=cur();if(r?.enemy?.hp>0){r.enemy.hp=0;concludeFight(r.enemy);}return;}
  switch(c){
    case "look":case "l": describeRoom(true);break;
    case "next":case "n":case "forward": advanceRoom();break;
    case "fight":case "attack":case "battle": fightRoom();break;
    case "search": searchRoom();break;
    case "take gun": takeGun();break;
    case "status": showStatusFull();break;
    case "party": showParty();break;
    case "rest": doRest();break;
    case "help": showHelp();break;
    case "quit":case "exit": bl();p("The court records your withdrawal.","dim");G=null;phase="title";startTitle();return;
    default: p("The building does not recognise that.","dim");
  }
  updBar();
}

function showHelp(){
  bl();p("=== COMMANDS ===","accent");

  p("fight        — engage enemy");p("search       — search for items");
  p("take gun     — pick up a gun");p("status       — full status");
  p("party        — party details");p("rest         — rest (costs $20)");
  p("help         — this list");p("quit         — leave");
}

function showParty(){
  bl();p("=== PARTY ===","accent");
  G.party.filter(m=>m.hp>0).forEach(m=>{
    p(`${m.name} (${m.role}) HP ${m.hp}/${m.maxHp}${m.limitReady?" [LIMIT READY]":""}`);

function advanceRoom(){
  const r=cur();
  if(r?.enemy?.hp>0){p("Something is still in your way.","dim");return;}
  if(G.currentRoom>=39){G.currentRoom=40;checkEnd();return;}
  const oldFloor=cur().floor;
  G.currentRoom++;G.roomsCleared++;
  const newFloor=cur().floor;
  if(newFloor>oldFloor){
    bl();sp("═");p("  "+FLOORS[newFloor-1].name.toUpperCase(),"white");
    p("  "+FLOORS[newFloor-1].desc,"dim");sp("═");
    const d=Math.round(ri(4,10)*G.dr);addDread(d);
    p(`Moving to a new floor. +${d} Dread.`,"dim");
  }
  tryEvent();
  if(G.hp>0&&G.currentRoom<40){showStatusFull();describeRoom();}
  checkEnd();
}

function fightRoom(){
  const r=cur();
  if(!r?.enemy||r.enemy.hp<=0){p("Nothing to fight here.","dim");return;}
  startCombat(r.enemy);
}

function searchRoom(){
  const r=cur();
  if(r?.enemy?.hp>0){p("Not while something is in here.","dim");return;}
  bl();p("You search the room.","dim");let found=false;
  if(Math.random()<0.40){const g=ri(8,20);G.scraps+=g;p(`$${g} found.`,"green");found=true;}
  if(Math.random()<0.35){const s=ri(2,5);G.shells+=s;p(`${s} shells.`,"green");found=true;}
  if(Math.random()<0.22){G.med++;p("+1 medication.","green");found=true;}
  if(Math.random()<0.28){G.motions++;p("+1 motion to dismiss.","green");found=true;}
  if(Math.random()<0.15){G.evidence++;p("+1 evidence file.","green");found=true;}
  if(Math.random()<0.20){p(pick(RLORE),"dim");const d=Math.round(ri(2,6)*G.dr);addDread(d);p(`+${d} Dread.`,"dim");found=true;}
  if(!found) p("Nothing useful here.","dim");
  updBar();
}

function takeGun(){
  const r=cur();
  if(!r?.gunOnFloor||r.flags.gunTaken){p("No gun to take.","dim");return;}
  r.flags.gunTaken=true;
  const gd=GUNS.find(g=>g.name===r.gunOnFloor)||GUNS[0];
  G.gun={name:gd.name,desc:gd.desc,dmgMin:gd.dmgMin,dmgMax:gd.dmgMax,cost:gd.cost,effect:gd.effect};
  p(`You pick up the ${G.gun.name}.`,"green");p(G.gun.desc,"dim");updBar();
}

function doRest(){
  const r=cur();
  if(r?.enemy?.hp>0){p("Not while something is in here.","dim");return;}
  if(G.scraps<20){p("Not enough scraps. (Need $20)","dim");return;}
  G.scraps-=20;
  const heal=ri(10,18);G.hp=Math.min(G.maxHp,G.hp+heal);
  const d=Math.round(ri(2,5)*G.dr);addDread(d);
  const scenes=[
    [`${G.huskyName} finds a chair that faces a wall. Sits in it.`,"The wall has a crack in it that looks like a filing number.","The building adjusts."],
    [`${G.huskyName} sits on the floor.`,"The carpet is warm. It has always been warm.","The warmth knows your name."],
    [`${G.huskyName} finds a waiting room bench.`,"There is a magazine on the seat. The cover story is about you.","The article is sympathetic. That is worse than the alternative."],
    [`${G.huskyName} leans against the wall.`,"The wall leans back.","Patiently.","The building is very patient."]
  ];
  pick(scenes).forEach(l=>p(l,"dim"));
  p(`+${heal} HP. +${d} Dread. Rest is not free here.`);updBar();
}

function addDread(n){
  G.dread=clamp(G.dread+Math.round(n*G.dr),0,100);
  if(G.dread>=100) dreadCollapse();
}

function dreadCollapse(){
  bl();sp("═");p("The courthouse wins.","yellow");bl();
  [`${G.huskyName} stops in the middle of the corridor.`,"","Not because something happened.","Because nothing did.","","Because the carpet pattern repeated exactly as it should","and the fluorescent light buzzed at the correct frequency","and the building was exactly what it appeared to be.","","A place where cases are decided.","A place that decided this one before "+G.huskyName+" walked in.","A place that decided it before "+G.huskyName+" was born.","",`${G.huskyName} sits down on a bench that was not there a moment ago.`,"The bench fits perfectly. The building has always had "+G.huskyName+"'s measurements.","","The client is waiting. The client has always been waiting.","That is the thing "+G.huskyName+" was not supposed to understand.","","When they find "+G.huskyName+", there is no distress.","Not that "+G.huskyName+" broke. That "+G.huskyName+" had understood something.","That the understanding was the ending."].forEach(l=>p(l,"dim"));
  bl();sp("═");G.done=true;phase="done";updBar();bl();p("(type anything to return)","dim");
}

function tryEvent(){
  if(Math.random()>0.38)return;
  const h=G.huskyName,roll=Math.random();
  if(roll<0.18){
    const d=Math.round(ri(4,9)*G.dr);addDread(d);
    const evs=[[`The lights go out.`,"When they come back, "+h+" is in a different place.",""+h+" does not remember moving."],[`The speaker system activates. No words. Just breathing.`,"It knows "+h+"'s name. It doesn't say it. That's worse."],[`A door `+h+` didn't open closes.`,"The sound it makes is "+h+"'s name."]];
    pick(evs).forEach(l=>p(l,"dim"));p(`+${d} Dread.`,"dim");
  } else if(roll<0.33){
    const g=ri(8,18);G.scraps+=g;
    const evs=[["A wallet on the floor. Still warm.","The ID inside has a photo. The photo looks almost like "+h+`.  +$${g}.`],["A briefcase, unlocked. $"+g+" inside.","The case has "+h+"'s initials on the latch."],["$"+g+" in an evidence envelope. The case number matches this one."]];
    pick(evs).forEach(l=>p(l,"dim"));
  } else if(roll<0.46){
    const s=ri(2,5);G.shells+=s;
    const evs=[["Shells on a windowsill. Someone left them here. For someone.",""+h+" suspects they left them. "+h+" has not been on this floor before."],["A desk drawer, slightly open. "+s+" shells inside.","A sticky note: FOR THE DEFENSE.","The note is in "+h+"'s handwriting."]];
    pick(evs).forEach(l=>p(l,"dim"));p(`+${s} shells.`,"green");
  } else if(roll<0.58){
    G.motions++;
    ["A motion to dismiss. Filing date: tomorrow. Already stamped.","The signature line is blank.","Below it: SIGN WHEN READY.","+1 Motion."].forEach(l=>p(l,"dim"));
  } else if(roll<0.70){
    G.med++;p(`A bottle with ${h}'s name on the label.`,"dim");p("There was no prescription for this.","dim");p("The dosage instructions are in "+h+"'s handwriting.","dim");p("+1 Medication.","green");
  } else if(roll<0.83){
    const d=Math.round(ri(5,11)*G.dr);addDread(d);p(pick(RLORE),"dim");p(`+${d} Dread.`,"dim");
  } else {
    const d=Math.round(ri(3,8)*G.dr);addDread(d);
    const evs=[[`The speaker system activates.`,`"${pick(BOSS_LINES.flat())}"`,`There is no speaker system in this part of the building.`,"The voice knew "+h+"'s name before it started the sentence."],[`A phone rings. In a room with no phones.`,h+" answers it.","It is the building.","The building is calling to confirm "+h+"'s attendance."],[`The elevator arrives. `+h+` did not press the button.`,"The floor indicator shows a level that doesn't exist.","The doors open.","The doors close.","Nothing has changed. Something has changed."]];
    pick(evs).forEach(l=>p(l,"dim"));p(`+${d} Dread.`,"dim");
  }
}

// ── COMBAT ────────────────────────────────────────────────────────────────────
function startCombat(enemy){
  if(!enemy.maxHp) enemy.maxHp=enemy.hp;
  enemy.se=enemy.se||{};
  G._inCombat=true;G._enemy=enemy;G._atbP=0;G._atbE=0;G._defBonus=0;
  bl();sp("─");
  p(`[${enemy.name}]`,"yellow");p(enemy.desc,"dim");
  if(enemy.isBoss) p(`"${pick(BOSS_LINES[cur().floor-1])}"`,"dim");
  sp("─");
  showCS();promptCombat();
}

function showCS(){
  const h=G.huskyName,e=G._enemy;
  bl();p("--- ---","dim");
  const hc=G.hp<G.maxHp*0.3?"red":G.hp<G.maxHp*0.6?"yellow":"";
  p(`${h}: HP ${G.hp}/${G.maxHp} | Dread ${G.dread} | Shells ${G.shells}`,hc);
  if(G.gun) p(`Gun: ${G.gun.name}`,"dim");
  const es=Object.keys(e.se).filter(k=>e.se[k]>0).map(k=>`${k}(${e.se[k]})`).join(", ");
  p(`${e.name}: HP ${e.hp}/${e.maxHp}${es?" ["+es+"]":""}`);
  G.party.filter(m=>m.hp>0).forEach(m=>{
    const lim=m.limitReady?" [LIMIT]":"";
    p(`  ${m.name}: HP ${m.hp}/${m.maxHp}${lim}`,"dim");
  });
  p("--- ---","dim");
}

function promptCombat(){
  const h=G.huskyName;
  bl();p(`${h}'s turn.`,"accent");
  const sl=G.gun?`S.Shoot[${G.shells}sh]`:"S.Shoot[no gun]";
  const hasLim=G.party.some(m=>m.limitReady&&m.hp>0);
  p(`1.Object  2.Item  3.Hold  4.Party  5.ArgRecord  6.Expose  7.PsychEval  ${sl}${hasLim?"  L.Limit":""}`);
}

function doCombat(raw){
  const c=raw.trim().toLowerCase();
  const e=G._enemy;
  if(G._sub){doSub(raw);return;}
  if(c==="fkill"){e.hp=0;p(".","dim");checkEnd2();return;}
  switch(c){
    case "1": doBasicAtk(e);break;
    case "2": openItemMenu();return;
    case "3": doHold();break;
    case "4": openPartyMenu();return;
    case "5": doArgueRecord(e);break;
    case "6": doExpose(e);break;
    case "7": doPsychEval(e);break;
    case "s": doShoot(e);break;
    case "l":{const m=G.party.find(m=>m.limitReady&&m.hp>0);if(m){doLimit(m,e);m.limitReady=false;}else p("No limit ready.","dim");break;}
    default: p(`${G.huskyName} hesitates. The building notes this.`,"dim");addDread(Math.round(ri(1,3)*G.dr));
  }
  checkEnd2();
}

function doBasicAtk(e){
  const h=G.huskyName;
  let dmg=Math.max(1,Math.round((G.atk-e.def)*G.dm));
  if(G.argStyle==="aggressive"&&Math.random()<0.35){
    e.hp=Math.max(0,e.hp-dmg);
    p('"Objection." The word lands like something physical.');p(`${e.name} takes ${dmg}.`);
    if(e.hp>0){const b=Math.round(dmg*0.5);e.hp=Math.max(0,e.hp-b);p(`${h} doesn't stop there. Follow-up: ${b} more.`);}
  } else {
    e.hp=Math.max(0,e.hp-dmg);
    p(pick(['"Objection." The word lands like something physical.',`${h} makes the argument. The argument makes contact.`,`"Sustained." It costs the enemy ${dmg}.`,`The objection is not rhetorical. ${e.name} takes ${dmg}.`]));
  }
  if(e.hp<=0) p(`${e.name} stops.`,"green");
}

function doHold(){
  const bonus=G.argStyle==="defensive"?4:2;
  G._defBonus=(G._defBonus||0)+bonus;
  p(`${G.huskyName} does not speak. Holds position.`,"dim");p(`DEF +${bonus}`,"dim");
}
function doArgueRecord(e){
  const drain=ri(2,5),heal=Math.round(ri(8,14)*G.dr);
  e.atk=Math.max(0,e.atk-drain);G.dread=Math.max(0,G.dread-heal);
  p(`${G.huskyName} argues the record, point by point.`);
  p(`${e.name} ATK -${drain}. Naming what is wrong makes it smaller. -${heal} Dread.`,"green");
}
function doExpose(e){
  const old=e.def;e.def=Math.ceil(e.def/2);
  p(`${G.huskyName} finds the contradiction at the centre of the testimony.`);
  p('"Your own filing contradicts this."',"dim");p(`${e.name} DEF ${old} → ${e.def}. Exposed.`,"accent");
}
function doPsychEval(e){
  if(Math.random()<0.40){
    e.se.stunned=(e.se.stunned||0)+1;
    const d=Math.round(ri(2,5)*G.dr);addDread(d);
    p(`${G.huskyName} requests a psychological evaluation.`);p("The building does not like this question.","dim");
    p(`${e.name} cannot act next turn. +${d} Dread.`,"dim");
  } else {
    const d=Math.round(ri(3,6)*G.dr);addDread(d);
    p(`${G.huskyName} requests a psychological evaluation.`);p("The request is denied. The noting is a threat.","dim");p(`+${d} Dread.`,"dim");
  }
}
function doShoot(e){
  if(!G.gun){p("No gun.","dim");return;}
  if(G.shells<G.gun.cost){p(`Need ${G.gun.cost} shells.`,"dim");return;}
  G.shells-=G.gun.cost;
  const dmg=ri(G.gun.dmgMin,G.gun.dmgMax);
  if(G.gun.effect==="pierce"){e.hp=Math.max(0,e.hp-dmg);p(`The ${G.gun.name} fires. ${e.name} takes ${dmg} — defense ignored.`);}
  else if(G.gun.effect==="suppress"){e.hp=Math.max(0,e.hp-dmg);e.spd=Math.max(1,(e.spd||10)-3);p(`The ${G.gun.name} fires. ${e.name} takes ${dmg}. Something suppresses.`);}
  else{const actual=Math.max(1,dmg-e.def);e.hp=Math.max(0,e.hp-actual);p(`The ${G.gun.name} fires. ${e.name} takes ${actual}.`);}
  p(`(${G.shells} shells remaining)`,"dim");
  if(e.hp<=0) p(`${e.name} stops.`,"green");
}

function openItemMenu(){
  bl();p(`Items: 1.Medication(${G.med})  2.Motion(${G.motions})  3.Evidence(${G.evidence})`,"accent");
  G._sub="item";
}
function openPartyMenu(){
  const alive=G.party.filter(m=>m.hp>0);
  if(!alive.length){p("No one else is standing.","dim");return;}
  bl();p("Choose party member:","accent");alive.forEach((m,i)=>p(`${i+1}. ${m.name}`));
  G._sub="party_pick";G._partyAlive=alive;
}

function doSub(raw){
  const c=raw.trim();
  if(G._sub==="item"){
    G._sub=null;const e=G._enemy;const h=G.huskyName;
    if(c==="1"){if(G.med>0){G.med--;const hh=ri(12,18);G.hp=Math.min(G.maxHp,G.hp+hh);p(`${h} takes medication. +${hh} HP.`,"green");}else p("None left.","dim");}
    else if(c==="2"){if(G.motions>0){G.motions--;if(G.dismissed<G.charges.length){G.dismissed++;const d=Math.round(ri(8,14)*G.dr);G.dread=Math.max(0,G.dread-d);p(`Motion granted. Charge dismissed. -${d} Dread.`,"green");}else p("All charges addressed.","dim");}else p("No motions.","dim");}
    else if(c==="3"){if(G.evidence>0){G.evidence--;const dmg=Math.round(ri(10,18)*G.dm),d=Math.round(7*G.dr);e.hp=Math.max(0,e.hp-dmg);G.dread=Math.max(0,G.dread-d);p(`Evidence presented. ${e.name} takes ${dmg}. -${d} Dread.`,"green");}else p("No evidence.","dim");}
    else p(`${G.huskyName} closes the briefcase.`,"dim");
    checkEnd2();updBar();
  } else if(G._sub==="party_pick"){
    G._sub=null;const idx=parseInt(c)-1;
    const actor=G._partyAlive[idx]||G._partyAlive[0];
    bl();p(`${actor.name}:`,"accent");
    actor.skills.forEach((s,i)=>p(`${i+1}. ${s.replace(/_/g," ")} — ${SKILL_DESCS[s]||"?"}`));
    if(actor.gName) p(`${actor.skills.length+1}. Shoot [${actor.gShells}sh]`,"dim");
    p("Enter to cancel","dim");
    G._sub="party_skill";G._partyActor=actor;G._partyEnemy=G._enemy;
  } else if(G._sub==="party_skill"){
    G._sub=null;if(!c.trim()){checkEnd2();return;}
    const idx=parseInt(c)-1;const actor=G._partyActor;const e=G._partyEnemy;
    if(actor.gName&&idx===actor.skills.length){
      // party shoot
      if(actor.gShells<actor.gCost){p(`${actor.name}: not enough shells.`,"dim");}
      else{actor.gShells-=actor.gCost;const d=Math.max(1,ri(actor.gMin,actor.gMax)-e.def);e.hp=Math.max(0,e.hp-d);p(`${actor.name}'s ${actor.gName} fires. ${e.name} takes ${d}.`);if(e.hp<=0) p(`${e.name} stops.`,"green");}
    } else {
      const skill=actor.skills[idx];
      if(!skill){p("Nothing happens.","dim");}
      else{execSkill(actor,skill,e);}
    }
    // Limit check
    if(!actor.limitReady&&(actor.hp<actor.maxHp*0.3||G.dread>65)){
      actor.limitReady=true;p(`\n${actor.name}'s LIMIT is ready! (Press L on your turn.)`,"yellow");
    }
    checkEnd2();updBar();
  }
}

function execSkill(actor,skill,e){
  const h=G.huskyName;
  switch(skill){
    case "aggressive_cross":{const d=Math.round(ri(11,18)*G.dm),dr=Math.round(ri(4,7)*G.dr);e.hp=Math.max(0,e.hp-d);addDread(dr);p(`${actor.name} tears the testimony apart. ${e.name} takes ${d}. +${dr} Dread.`);break;}
    case "strike_from_record": e.atk=Math.max(0,e.atk-3);p(`${actor.name}: "Motion granted." ${e.name} ATK -3.`);break;
    case "procedural_block": G._defBonus=(G._defBonus||0)+2;G.party.forEach(m=>m.hp>0&&(m.def+=1));p(`${actor.name} raises a procedural objection. Party defense up.`,"accent");break;
    case "motion_to_suppress": e.spd=Math.max(1,(e.spd||10)-4);p(`${actor.name} files to suppress. ${e.name} loses momentum.`);break;
    case "find_the_crack":{e.def=Math.max(0,e.def-3);const dr=Math.round(ri(2,5)*G.dr);addDread(dr);p(`${actor.name} finds the crack. ${e.name} DEF -3. +${dr} Dread.`);break;}
    case "exhibit_suppressed":{const d=Math.round(ri(9,15)*G.dm),drop=Math.round(8*G.dr);e.hp=Math.max(0,e.hp-d);G.dread=Math.max(0,G.dread-drop);p(`${actor.name} re-enters suppressed exhibit. ${e.name} takes ${d}. -${drop} Dread.`,"green");break;}
    case "contempt_charge": e.se.stunned=(e.se.stunned||0)+1;p(`${actor.name}: "I move for contempt." ${e.name} stunned 1 turn.`,"accent");break;
    case "hostile_witness":{const conv=Math.round(e.atk*0.4);e.atk-=conv;e.se.self_damage=conv;p(`${actor.name} turns the witness. ATK -${conv}, self-damage ${conv} next turn.`,"accent");break;}
    case "seal_the_record":{e.se.sealed=(e.se.sealed||0)+3;const dr=Math.round(ri(3,6)*G.dr);G.dread=Math.max(0,G.dread-dr);p(`${actor.name} seals the record. Boss passives blocked 3 turns. -${dr} Dread.`,"green");break;}
    case "chain_objection":{let tot=0;[1.0,0.75,0.55].forEach((mult,i)=>{if(e.hp<=0)return;const d=Math.max(1,Math.round((G.atk-e.def)*G.dm*mult));e.hp=Math.max(0,e.hp-d);tot+=d;p(`Objection ${i+1}: ${d}.`);});p(`Chain objection — ${tot} total.`,"accent");break;}
    case "counsel_redirect":{const d=Math.round(ri(22,34)*G.dm),drop=Math.round(ri(15,22)*G.dr);e.hp=Math.max(0,e.hp-d);G.dread=Math.max(0,G.dread-drop);p(`"Redirect, Your Honor." ${e.name} takes ${d}. -${drop} Dread.`,"green");break;}
    default: p("Nothing happens.","dim");
  }
}

function doLimit(actor,e){
  p(`"${actor.limitName}"`,"yellow");
  switch(actor.limitName){
    case "SUSTAINED. SUSTAINED. SUSTAINED.": [0,1,2].forEach(()=>{if(e.hp<=0)return;const d=Math.round(ri(8,13)*G.dm);e.hp=Math.max(0,e.hp-d);p(`The objection lands. ${e.name} takes ${d}.`);});break;
    case "THE RECORD WILL REFLECT": e.atk-=4;e.def=Math.max(0,e.def-2);p(`${e.name} ATK-4, DEF-2. It cannot argue with the record.`);break;
    case "MISTRIAL": e.spd=1;const d1=Math.round(15*G.dr);G.dread=Math.max(0,G.dread-d1);p(`${e.name} loses all momentum. -${d1} Dread.`,"green");break;
    case "MOTION TO COMPEL": e.atk=Math.max(0,e.atk-3);e.def=Math.max(0,e.def-3);e.spd=Math.max(1,(e.spd||10)-3);p("Opposition compelled to reveal everything. All stats reduced.");break;
    case "MATERIAL WITNESS": {const d=Math.round(ri(28,40)*G.dm);e.hp=Math.max(0,e.hp-d);p(`${actor.name} testifies to something the building cannot refute. ${d} damage.`,"accent");}break;
    case "REASONABLE DOUBT": e.se.stunned=(e.se.stunned||0)+2;p(`Doubt introduced. ${e.name} cannot act for 2 turns.`,"accent");break;
    case "READ BACK THE RECORD": {const d=Math.round(ri(15,25)*G.dm),drop=Math.round(20*G.dr);e.hp=Math.max(0,e.hp-d);G.dread=Math.max(0,G.dread-drop);p(`Every hostile word read back. ${d} damage, -${drop} Dread.`,"green");}break;
    case "I KNOW WHAT YOU DID": e.def=0;e.spd=Math.max(1,(e.spd||10)-5);p(`The janitor has seen everything. ${e.name} DEF 0, SPD crippled.`,"accent");break;
    default: {const d=Math.round(ri(20,30)*G.dm);e.hp=Math.max(0,e.hp-d);p(`${actor.name}'s limit fires. ${d} damage.`);}
  }
}

function enemyTurn(e){
  if(e.hp<=0)return;
  const h=G.huskyName;
  e.se=e.se||{};
  // Status effects
  if((e.se.stunned||0)>0){e.se.stunned--;p(`${e.name} cannot act. (Stunned)`,"dim");return;}
  if((e.se.self_damage||0)>0){const sd=e.se.self_damage;delete e.se.self_damage;e.hp=Math.max(0,e.hp-sd);p(`${e.name} cannot contain the contradiction. Takes ${sd} self-damage.`,"dim");if(e.hp<=0)return;}
  if((e.se.sealed||0)>0) e.se.sealed--;
  // Boss passive
  if(e.isBoss&&Math.random()<0.32&&!(e.se.sealed>0)){
    const d=Math.round(ri(6,13)*G.dr);addDread(d);
    p(`${e.name} ${pick(BOSS_PASSIVE)}`,"dim");p(`(${h} notices. The building wants ${h} to notice.)`,"dim");p(`+${d} Dread.`,"dim");
    if(G.dread>50&&Math.random()<0.35) p("\n("+pick(HORROR.slice(G.dread>60?-8:3))+")"," dim");
    checkBossPhase(e);return;
  }
  // Attack
  const tp=G.party.filter(m=>m.hp>0);
  const hitP=Math.random()<0.6||!tp.length;
  if(hitP){
    const effDef=G.def+(G._defBonus||0);G._defBonus=0;
    const dmg=Math.max(1,Math.round((e.atk-effDef)*G.dm));
    const verbs=[`presents evidence ${h} has never seen before. ${h} has seen it before.`,`calls a witness. The witness describes ${h}. Accurately.`,`reads from a document. The document is about ${h}. The date is wrong.`,`approaches the bench. The judge does not look up.`,`introduces an exhibit. The exhibit is a memory.`,`speaks. The words are procedurally correct. Also personally devastating.`];
    p(`${e.name} ${pick(verbs)}`,"dim");G.hp=Math.max(0,G.hp-dmg);p(`${h} takes ${dmg}.`,G.hp<G.maxHp*0.3?"red":"");
    if(G.hp<=0) p(`${h} collapses.`,"red");
  } else {
    const target=pick(tp);const dmg=Math.max(1,Math.round((e.atk-target.def)*G.dm));
    target.hp=Math.max(0,target.hp-dmg);
    p(`${e.name} turns on ${target.name}. ${target.name} takes ${dmg}.`,target.hp<target.maxHp*0.3?"red":"");
    if(target.hp<=0) p(`${target.name} goes down.`,"dim");
  }
  if(Math.random()<0.12) p("\n("+pick(HORROR.slice(G.dread>60?-8:G.dread>30?3:0))+")"," dim");
  checkBossPhase(e);
}

function checkBossPhase(e){
  if(!e.isBoss)return;
  const lines=BOSS_PHASES[e.name];
  if(!lines)return;
  if(e.phase===1&&e.hp<e.maxHp*0.60){
    e.phase=2;
    if(lines[0]) lines[0].forEach(l=>p(l.replace(/\[\[HN\]\]/g,G.huskyName),"yellow"));
    e.atk+=3;const d=Math.round(ri(8,14)*G.dr);addDread(d);
    p(`${e.name} ATK increased. +${d} Dread.`,"dim");
  }
  if(e.phase===2&&e.hp<e.maxHp*0.25){
    e.phase=3;
    if(lines[1]) lines[1].forEach(l=>p(l.replace(/\[\[HN\]\]/g,G.huskyName),"yellow"));
    e.spd=(e.spd||10)+3;e.def=Math.max(0,e.def-2);const d=Math.round(ri(10,16)*G.dr);addDread(d);
    p(`${e.name} has stopped being careful. SPD up, DEF down. +${d} Dread.`,"dim");
  }
}

function checkEnd2(){
  const e=G._enemy;
  if(G.hp<=0){
    G._inCombat=false;G.done=true;
    bl();p(`${G.huskyName} does not finish the trial.`,"red");
    p("Not because "+G.huskyName+" gave up.","dim");p("Because the building ran out of patience.","dim");
    p("The case continues in "+G.huskyName+"'s absence.","dim");p("The client is found guilty on all counts.","dim");
    p("The defendant's chair still has the claw marks in it.","dim");p("New ones now. No one will comment on them.","dim");
    p("That is why the building chose "+G.huskyName+".","dim");
    bl();sp("═");phase="done";G=null;bl();p("(type anything to return)","dim");updBar();return;
  }
  if(e.hp<=0){G._inCombat=false;concludeFight(e);return;}
  if(G.dread>=100){G._inCombat=false;dreadCollapse();return;}
  // Enemy ATB turn
  G._atbP+=G.spd;G._atbE+=e.spd||12;
  if(G._atbE>=100){G._atbE=0;enemyTurn(e);}
  if(G._inCombat){showCS();promptCombat();}
  updBar();
}

function concludeFight(e){
  bl();p(`${e.name} stops.`);p("Not because it has been defeated.","dim");p("Because it has run out of argument. For now.","dim");
  const g=ri(10,22)+(e.isBoss?ri(20,35):0);G.scraps+=g;p(`${G.huskyName} finds $${g}.`,"green");
  if(Math.random()<0.40){const s=ri(2,5);G.shells+=s;p(`${s} shells on the floor.`,"green");}
  if(Math.random()<0.28){G.motions++;p("+1 motion to dismiss.`","green");}
  if(e.isBoss){const d=Math.round(12*G.dr);G.dread=Math.max(0,G.dread-d);const fl=FLOORS[cur().floor-1];p(`${fl.name} is quieter now. Not safe. Quieter.`,"dim");p(`-${d} Dread.`,"green");}
  const r=cur();if(r) r.enemy=null;
  updBar();
}

// ── ENDINGS ───────────────────────────────────────────────────────────────────
function checkEnd(){
  if(!G)return;
  if(G.currentRoom>=40&&G.hp>0) theVerdict();
  else if(G.hp<=0) contempt();
}
function contempt(){
  G.done=true;phase="done";bl();sp("═");
  const h=G.huskyName;
  [`${h} does not finish the trial.`,"","Not because "+h+" gave up.","Because the building ran out of patience.","","Room "+(G.currentRoom+1)+" of 40.","","The case continues in "+h+"'s absence.","The building has argued for the defense before.","It does not do it at all. This is intentional.","","The client is found guilty on all counts.","The client does not react. The client has never reacted.","","The defendant's chair still has the claw marks in it.","New ones now. No one will comment on them.","That has always been the worst part.",""+h+" knew that.","That is why the building chose "+h+"."].forEach(l=>p(l,"dim"));
  bl();sp("═");bl();p("(type anything to return)","dim");G=null;
}
function theVerdict(){
  G.done=true;phase="done";
  const h=G.huskyName,dismissed=G.dismissed,total=G.charges.length;
  bl();sp("═");
  [`Room 40.`,"","The deliberation room.","",`${h} has been in this building for a long time.`,"The lights have not changed. They were always this colour.","The husky understands now that this is the colour of judgment.","","The door at the end of the deliberation room opens.","","The jury files back in.","",`${h} has never seen them before.`,`${h} has been seeing them the whole time.`].forEach(l=>p(l,"dim"));
  bl();p("On the charges:","accent");bl();
  G.charges.forEach((ch,i)=>{
    const v=i<dismissed?"NOT GUILTY.":"GUILTY.";
    p(`  ${ch}`);p(`  ${v}`,i<dismissed?"green":"red");bl();
  });
  if(dismissed===total){
    ["All charges dismissed.","",`The judge looks at ${h} for a long time.`,`"The husky found something in this building we did not leave for it."`,'"We will have to correct that."',"","The door opens.","The client walks out first. Does not look back.",`${h} follows.`,"","Outside, the light is wrong. Too much. Too immediate.","The building watches from every window.","It is already preparing the next filing."].forEach(l=>p(l,l.startsWith('"')?"dim":""));
  } else if(dismissed>=Math.ceil(total/2)){
    [`Partial acquittal.`,"",'"The client will be remanded for the remaining counts."','"Counsel may appeal."',"","The client is already asleep on the defense table.","The bailiff photographs this for the record.","",`${h} will appeal. The building will be waiting.`].forEach(l=>p(l,"dim"));
  } else {
    ["Conviction on most counts.","","The gavel comes down. It is the first sound here that has felt real.","","The client does not react.",`${h} has decided that makes it worse.`,"",`${h} files the appeal on the steps outside. In the rain. Alone.`,"The building is lit from every floor.","It looks like something deciding."].forEach(l=>p(l,"dim"));
  }
  bl();p(`${h}.`);
  const survived=G.party.filter(m=>m.hp>0);
  p(`Followers who made it: ${survived.length?survived.map(m=>m.name).join(", "):"none."}`,"dim");
  p(`Rooms cleared: ${G.roomsCleared}/40.`,"dim");
  p(`Dread at verdict: ${G.dread}/100.`,G.dread>=70?"red":G.dread>=40?"yellow":"dim");
  p(`Charges dismissed: ${dismissed}/${total}.`,"dim");
  bl();
  if(G.dread<=25) p(`${h} walks away mostly intact.`,"dim");
  else if(G.dread<=55) p(`${h} walks away. Walking will have to be enough.`,"dim");
  else if(G.dread<=80){p(`Something about the angle of ${h}'s shoulders`,"dim");p("when the husky left the building will not go back to what it was.","dim");}
  else{p(`${h} leaves the building.`,"dim");p(`The building does not leave ${h}.`,"dim");p("That is not a metaphor.","dim");}
  bl();
  [`Somewhere in the records room on the third floor,`,"in a cabinet that was locked before "+h+" arrived,","a new folder has been added.","","COMMONWEALTH v. THE CLIENT — CASE II","","The filing date is four months from now.","The judge has already signed the summons.","The defendant's chair still has the claw marks in it.","","They always have the claw marks in it.","","","In the basement of this building,","beneath the sub-basement,","beneath the floor that doesn't appear on blueprints,","there is a door.","","The door was here before the building.","The building was built around it.","","On the other side of the door: a smell.","","Old paper.","Old ink.","Something that has been filed and filed and filed","for longer than filing has existed.","","The Infinite Library has a courthouse annex.","The cases that reach this building began their processing there.","","Somewhere in the stacks, "+h+"'s name is in a ledger.","","It has been there a long time.","","D A R K F L O O F","THE NEXT CASE"].forEach(l=>p(l,"dim"));
  bl();sp("═");bl();p("(type anything to return)","dim");G=null;
}

// ── INPUT ─────────────────────────────────────────────────────────────────────
document.getElementById("cmd").addEventListener("keydown",ev=>{
  if(ev.key!=="Enter")return;
  const raw=document.getElementById("cmd").value;
  document.getElementById("cmd").value="";
  if(raw.trim()) p(`> ${raw}`,"dim");
  if(phase==="done"||(!G&&phase==="play")){G=null;startTitle();return;}
  if(phase!=="play"){doSetup(raw);updBar();return;}
  if(!G){startTitle();return;}
  doPlay(raw);updBar();
});
document.addEventListener("click",()=>document.getElementById("cmd").focus());
startTitle();
</script>
