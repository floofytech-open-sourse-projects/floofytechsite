// UTILITY

function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}

// ============================================================
const outEl=document.getElementById("output");
function print(text,cls){
  String(text).split("\n").forEach(l=>{
    const d=document.createElement("div");
    d.className="line"+(cls?" "+cls:"");
    d.textContent=l;
    outEl.appendChild(d);
  });
  outEl.scrollTop=outEl.scrollHeight;
}
function blank(){print("");}
function sep(ch,n){print((ch||"тФА").repeat(n||55),"dim");}

let G=null, setupPhase="title", pendingDiff="normal";

function newGame(counselName,huskyName,argStyle,difficulty){
  const dm=difficulty==="lenient"?0.75:difficulty==="maximum"?1.35:1.0;
  const dr=difficulty==="lenient"?0.6:difficulty==="maximum"?1.5:1.0;
  const er=difficulty==="lenient"?0.50:difficulty==="maximum"?0.90:0.75;
  const charges=shuffle(CHARGES).slice(0,4);
  G={
    counselName,huskyName,argStyle,difficulty,
    damageMult:dm,dreadMult:dr,encounterRate:er,
    hp:45,maxHp:45,atk:9,def:4,spd:10,
    scraps:80,shells:0,
    medication:3,motions:0,evidence:0,
    dread:0,
    chargesAgainst:charges,chargesDismissed:0,
    currentRoom:0,roomsCleared:0,
    party:[],followersFound:[],
    gun:null,
    rooms:[],
    phase:"play",
    _pendingConfirm:null,_subMenu:null,_inCombat:false
  };
  // Apply arg style
  if(argStyle==="aggressive") G.atk+=3;
  else if(argStyle==="defensive") G.def+=3;
  else G.spd+=2;
  // Setup co-counsel
  setupCoCounsel(argStyle);
  buildCourthouse();
}

function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

function setupCoCounsel(style){
  let co;
  if(style==="aggressive"){
    co={id:"co_counsel",name:"Second Chair Kael",role:"dps",hp:30,maxHp:30,atk:8,def:3,spd:11,skills:["aggressive_cross","strike_from_record"],limitName:"SUSTAINED. SUSTAINED. SUSTAINED.",limitReady:false,statusEffects:{},gunName:"Service Pistol",gunDmgMin:12,gunDmgMax:20,gunCost:1,gunShells:ri(3,6)};
  } else if(style==="defensive"){
    co={id:"co_counsel",name:"Second Chair Maren",role:"support",hp:34,maxHp:34,atk:5,def:7,spd:10,skills:["procedural_block","motion_to_suppress"],limitName:"THE RECORD WILL REFLECT",limitReady:false,statusEffects:{},gunName:"Compact Pistol",gunDmgMin:9,gunDmgMax:16,gunCost:1,gunShells:ri(3,6)};
  } else {
    co={id:"co_counsel",name:"Second Chair Solis",role:"mage",hp:28,maxHp:28,atk:7,def:4,spd:13,skills:["find_the_crack","exhibit_suppressed"],limitName:"MISTRIAL",limitReady:false,statusEffects:{},gunName:null,gunShells:0};
  }
  G.party=[co];
}

function buildCourthouse(){
  G.rooms=[];
  let roomNum=1;
  const availFollowers=[...FOLLOWER_TEMPLATES.map(f=>f.id)];
  const availGuns=[...COURTHOUSE_GUNS.map(g=>g.name)];
  shuffle(availFollowers); shuffle(availGuns);
  FLOORS.forEach((floor,fi)=>{
    const theme=floor.theme;
    const names=ROOM_NAMES[theme].slice();
    const descs=ROOM_DESCS[theme].slice();
    for(let ri2=0;ri2<10;ri2++){
      const isBoss=(ri2===9);
      const name=isBoss?FLOOR_BOSS_NAMES[fi]+"'s Domain":names[ri2%names.length];
      const desc=isBoss?floor.desc:pick(descs);
      const lore=Math.random()<0.55?pick(ROOM_LORE):null;
      const room={number:roomNum,name,desc,lore,floor:fi+1,theme,isBoss,visited:false,enemy:null,flags:{},follower:null,gunOnFloor:null};
      if(isBoss){room.enemy=genBoss(fi);}
      else if(Math.random()<G.encounterRate){room.enemy=genEnemy(theme);}
      if(!isBoss&&availFollowers.length&&Math.random()<0.28){room.follower=availFollowers.shift();}
      if(!isBoss&&availGuns.length&&Math.random()<0.18){room.gunOnFloor=availGuns.shift();}
      G.rooms.push(room); roomNum++;
    }
  });
}

function genEnemy(theme){
  const pool=ENEMY_POOL[theme]||ENEMY_POOL.lobby;
  const e=pick(pool);
  return {name:e.name,hp:ri(e.hp[0],e.hp[1]),maxHp:0,atk:ri(e.atk[0],e.atk[1]),def:ri(e.def[0],e.def[1]),spd:10,desc:e.desc,isBoss:false,statusEffects:{},phase:1};
}
function genBoss(fi){
  const hp=35+fi*15+ri(10,20);
  return {name:FLOOR_BOSS_NAMES[fi],hp,maxHp:hp,atk:11+fi*2+ri(2,5),def:5+fi,spd:12,desc:FLOOR_BOSS_DESCS[fi],isBoss:true,statusEffects:{},phase:1};
}

  } else {
    blank(); print("(The room is clear. Type NEXT to advance.)","dim");
  }
}

function handlePlay(raw){
  if(!G||G.phase==="done")return;
  const c=raw.trim().toLowerCase();
  if(G._pendingConfirm){
    const pc=G._pendingConfirm; G._pendingConfirm=null;
    (c==="y"||c==="yes")?pc.yes():pc.no();
    updateStatusBar(); return;
  }
  if(G._subMenu){ handleSubMenu(raw); return; }
  if(G._inCombat){ handleCombatInput(raw); return; }
  // fkill at world level
  if(c==="fkill"){ const r=curRoom(); if(r?.enemy?.hp>0){r.enemy.hp=0;concludeFight(r.enemy);} return; }
  switch(c){
    case "look": case "l": describeRoom(true); break;
    case "next": case "n": case "forward": advanceRoom(); break;
    case "fight": case "attack": case "battle": fightRoom(); break;
    case "search": searchRoom(); break;
    case "take gun": takeGun(); break;
    case "status": showStatusFull(); break;
    case "party": showParty(); break;
    case "rest": doRest(); break;
    case "help": showHelp(); break;
    case "quit": case "exit": blank(); print("The court records your withdrawal.","dim"); G=null; setupPhase="title"; startTitle(); return;
    default: print("The building does not recognise that.","dim");
  }
  updateStatusBar();
}

function advanceRoom(){
  const r=curRoom();
  if(r?.enemy?.hp>0){ print("Something is still in your way.","dim"); return; }
  if(G.currentRoom>=39){ G.currentRoom=40; checkEndgame(); return; }
  const oldFloor=curRoom().floor;
  G.currentRoom++; G.roomsCleared++;
  const newFloor=curRoom().floor;
  if(newFloor>oldFloor){
    blank(); sep("тХР");
    print("  "+FLOORS[newFloor-1].name.toUpperCase(),"white");
    print("  "+FLOORS[newFloor-1].desc,"dim"); sep("тХР");
    const d=Math.round(ri(4,10)*G.dreadMult); addDread(d);
    print(`Moving to a new floor. +${d} Dread.`,"dim");
  }
  tryRandomEvent();
  if(G.hp>0&&G.currentRoom<40){ showStatusFull(); describeRoom(); }
  checkEndgame();
}

function fightRoom(){
  const r=curRoom();
  if(!r?.enemy||r.enemy.hp<=0){ print("Nothing to fight here.","dim"); return; }
  startCombat(r.enemy);
}

function searchRoom(){
  const r=curRoom();
  if(r?.enemy?.hp>0){ print("Not while something is in here.","dim"); return; }
  blank(); print("You search the room.","dim");
  let found=false;
  if(Math.random()<0.40){const g=ri(8,20);G.scraps+=g;print(`$${g} found.`,"green");found=true;}
  if(Math.random()<0.35){const s=ri(2,5);G.shells+=s;print(`${s} shells.`,"green");found=true;}
  if(Math.random()<0.22){G.medication++;print("+1 medication.","green");found=true;}
  if(Math.random()<0.28){G.motions++;print("+1 motion to dismiss.","green");found=true;}
  if(Math.random()<0.15){G.evidence++;print("+1 evidence file.","green");found=true;}
  if(Math.random()<0.20){print(pick(ROOM_LORE),"dim");const d=Math.round(ri(2,6)*G.dreadMult);addDread(d);print(`+${d} Dread.`,"dim");found=true;}
  if(!found) print("Nothing useful here.","dim");
  updateStatusBar();
}

  } else if(roll<0.70){
    G.medication++;
    print(`A bottle with ${hn}'s name on the label.`,"dim");
    print("There was no prescription for this.","dim");
    print(`The dosage instructions are in ${hn}'s handwriting.`,"dim");
    print("+1 Medication.","green");
  } else if(roll<0.83){
    const d=Math.round(ri(5,11)*G.dreadMult); addDread(d);
    print(pick(ROOM_LORE),"dim"); print(`+${d} Dread.`,"dim");
  } else {
    const d=Math.round(ri(3,8)*G.dreadMult); addDread(d);
    const evs=[[`The speaker system activates.`,`"${pick(FLOOR_BOSS_LINES.flat())}"`,`There is no speaker system in this part of the building.`,"The voice knew "+hn+"'s name before it started the sentence."],[`A phone rings. In a room with no phones.`,hn+" answers it.","It is the building.","The building is calling to confirm "+hn+"'s attendance."],[`The elevator arrives. `+hn+` did not press the button.`,"The floor indicator shows a level that doesn't exist.","The doors open.","The doors close.","Nothing has changed. Something has changed."]];
    pick(evs).forEach(l=>print(l,"dim")); print(`+${d} Dread.`,"dim");
  }
}

// COMBAT
// ============================================================
function startCombat(enemy){
  if(!enemy.maxHp) enemy.maxHp=enemy.hp;
  G._inCombat=true; G._enemy=enemy;
  G._atbPlayer=0; G._atbEnemy=0;
  G._combatDefBonus=0;
  blank(); sep("тФА");
  print(`[${enemy.name}]`,"yellow"); print(enemy.desc,"dim");
  if(enemy.isBoss) print(`"${pick(FLOOR_BOSS_LINES[curRoom().floor-1])}"`,"dim");
  sep("тФА");
  showCombatStatus();
  promptCombat();
}

function showCombatStatus(){
  const hn=G.huskyName; const e=G._enemy;
  blank(); print("--- ---","dim");
  const hc=G.hp<G.maxHp*0.3?"red":G.hp<G.maxHp*0.6?"yellow":"";
  print(`${hn}: HP ${G.hp}/${G.maxHp} | Dread ${G.dread} | Shells ${G.shells}`,hc);
  if(G.gun) print(`Gun: ${G.gun.name}`,"dim");
  const es=e.statusEffects;
  const statStr=Object.keys(es).filter(k=>es[k]>0).map(k=>`${k}(${es[k]})`).join(", ");
  print(`${e.name}: HP ${e.hp}/${e.maxHp}${statStr?" ["+statStr+"]":""}`);
  G.party.filter(p=>p.hp>0).forEach(p=>{
    const lim=p.limitReady?" [LIMIT]":"";
    print(`  ${p.name}: HP ${p.hp}/${p.maxHp}${lim}`,"dim");
  });
  print("--- ---","dim");
}

function promptCombat(){
  const hn=G.huskyName;
  // Status effects display
  const pse=G._playerCombatStatusEffects||{};
  if(Object.keys(pse).length) print(`(Status: ${Object.keys(pse).join(", ")})`,"dim");
  blank(); print(`${hn}'s turn.`,"accent");
  const gunLabel=G.gun?`S. Shoot[${G.shells}sh]`:"S. Shoot[no gun]";
  const hasLimit=G.party.some(p=>p.limitReady&&p.hp>0);
  print(`1.Object  2.Item  3.Hold  4.Party  5.ArgRecord  6.Expose  7.PsychEval  ${gunLabel}${hasLimit?"  L.Limit":""}`);
}

function handleCombatInput(raw){
  const c=raw.trim().toLowerCase();
  const e=G._enemy;
  if(G._subMenu){ handleSubMenu(raw); return; }
  if(c==="fkill"){ e.hp=0; print(".","dim"); endCombatCheck(); return; }
  const alive=[e].filter(x=>x.hp>0);
  switch(c){
    case "1": doBasicAttack(e); break;
    case "2": openItemMenu(e); return;
    case "3": doHold(); break;
    case "4": openPartySkillMenu(e); return;
    case "5": doArgueRecord(e); break;
    case "6": doExpose(e); break;
    case "7": doPsychEval(e); break;
    case "s": doShoot(e); break;
    case "l":
      const readyMember=G.party.find(p=>p.limitReady&&p.hp>0);
      if(readyMember){ doLimitBreak(readyMember,e); readyMember.limitReady=false; }
      else print("No limit ready.","dim");
      break;
    default: print(`${G.huskyName} hesitates. The building notes this.`,"dim"); addDread(Math.round(ri(1,3)*G.dreadMult));
  }
  endCombatCheck();
}

function doBasicAttack(e){
  let dmg=Math.max(1,Math.round((G.atk-e.def)*G.damageMult));
  const hn=G.huskyName;
  if(G.argStyle==="aggressive"&&Math.random()<0.35){
    e.hp=Math.max(0,e.hp-dmg);
    print('"Objection." The word lands like something physical.'); print(`${e.name} takes ${dmg}.`);
    if(e.hp>0){ const bonus=Math.round(dmg*0.5); e.hp=Math.max(0,e.hp-bonus); print(`${hn} doesn't stop there. Follow-up: ${bonus} more.`); }
  } else {
    e.hp=Math.max(0,e.hp-dmg);
    const lines=['"Objection." The word lands like something physical.',`${hn} makes the argument. The argument makes contact.`,`"Sustained." It costs the enemy ${dmg}.`,`The objection is not rhetorical. ${e.name} takes ${dmg}.`];
    print(pick(lines));
  }
  if(e.hp<=0) print(`${e.name} stops.`,"green");
}

function doHold(){
  const bonus=G.argStyle==="defensive"?4:2;
  G._combatDefBonus=(G._combatDefBonus||0)+bonus;
  print(`${G.huskyName} does not speak. Holds position.`,"dim"); print(`DEF +${bonus}`,"dim");
}

function doArgueRecord(e){
  const drain=ri(2,5); const heal=Math.round(ri(8,14)*G.dreadMult);
  e.atk=Math.max(0,e.atk-drain); G.dread=Math.max(0,G.dread-heal);
  print(`${G.huskyName} argues the record, point by point.`);
  print(`${e.name} ATK -${drain}. Naming what is wrong makes it smaller. -${heal} Dread.`,"green");
}

function doExpose(e){
  const old=e.def; e.def=Math.ceil(e.def/2);
  print(`${G.huskyName} finds the contradiction at the centre of the testimony.`);
  print(`"Your own filing contradicts this."`,"dim");
  print(`${e.name} DEF ${old} тЖТ ${e.def}. Exposed.`,"accent");
}

function doPsychEval(e){
  if(Math.random()<0.40){
    e.statusEffects.stunned=(e.statusEffects.stunned||0)+1;
    const d=Math.round(ri(2,5)*G.dreadMult); addDread(d);
    print(`${G.huskyName} requests a psychological evaluation.`);
    print(`The building does not like this question.`,"dim");
    print(`${e.name} cannot act next turn. +${d} Dread.`,"dim");
  } else {
    const d=Math.round(ri(3,6)*G.dreadMult); addDread(d);
    print(`${G.huskyName} requests a psychological evaluation.`);
    print(`The request is denied. The noting is a threat.`,"dim"); print(`+${d} Dread.`,"dim");
  }
}

function doShoot(e){
  if(!G.gun){ print("No gun.","dim"); return; }
  if(G.shells<G.gun.cost){ print(`Need ${G.gun.cost} shells.`,"dim"); return; }
  G.shells-=G.gun.cost;
  const dmg=ri(G.gun.dmgMin,G.gun.dmgMax);
  if(G.gun.effect==="pierce"){
    e.hp=Math.max(0,e.hp-dmg);
    print(`The ${G.gun.name} fires. ${e.name} takes ${dmg} тАФ defense ignored.`);
  } else if(G.gun.effect==="suppress"){
    e.hp=Math.max(0,e.hp-dmg); e.spd=Math.max(1,e.spd-3);
    print(`The ${G.gun.name} fires. ${e.name} takes ${dmg}. Something suppresses.`);
  } else {
    const actual=Math.max(1,dmg-e.def); e.hp=Math.max(0,e.hp-actual);
    print(`The ${G.gun.name} fires. ${e.name} takes ${actual}.`);
  }
  print(`(${G.shells} shells remaining)`,"dim");
  if(e.hp<=0) print(`${e.name} stops.`,"green");
}

function openItemMenu(e){
  blank(); print(`Items: 1.Medication(${G.medication})  2.Motion(${G.motions})  3.Evidence(${G.evidence})`,"accent");
  G._subMenu="item_combat"; G._itemEnemy=e;
}
function handleItemCombat(raw){
  G._subMenu=null;
  const e=G._itemEnemy; const hn=G.huskyName;
  if(raw.trim()==="1"){
    if(G.medication>0){G.medication--;const h=ri(12,18);G.hp=Math.min(G.maxHp,G.hp+h);print(`${hn} takes medication. +${h} HP.`,"green");}else print("None left.","dim");
  } else if(raw.trim()==="2"){
    if(G.motions>0){G.motions--;if(G.chargesDismissed<G.chargesAgainst.length){G.chargesDismissed++;const d=Math.round(ri(8,14)*G.dreadMult);G.dread=Math.max(0,G.dread-d);print(`Motion granted. Charge dismissed. -${d} Dread.`,"green");}else print("All charges addressed.","dim");}else print("No motions.","dim");
  } else if(raw.trim()==="3"){
    if(G.evidence>0){G.evidence--;const dmg=Math.round(ri(10,18)*G.damageMult);const d=Math.round(7*G.dreadMult);e.hp=Math.max(0,e.hp-dmg);G.dread=Math.max(0,G.dread-d);print(`Evidence presented. ${e.name} takes ${dmg}. -${d} Dread.`,"green");}else print("No evidence.","dim");
  }
  endCombatCheck(); updateStatusBar();
}

function openPartySkillMenu(e){
  const alive=G.party.filter(p=>p.hp>0);
  if(!alive.length){ print("No one else is standing.","dim"); return; }
  blank(); print("Choose party member:","accent");
  alive.forEach((p,i)=>print(`${i+1}. ${p.name}`));
  G._subMenu="party_pick"; G._partyCombatEnemy=e; G._partyAlive=alive;
}
function handlePartyPick(raw){
  G._subMenu=null;
  const idx=parseInt(raw.trim())-1;
  const actor=G._partyAlive[idx]||G._partyAlive[0];
  const e=G._partyCombatEnemy;
  blank(); print(`${actor.name}:`,"accent");
  actor.skills.forEach((s,i)=>print(`${i+1}. ${s.replace(/_/g," ")} тАФ ${SKILL_DESCS[s]||"?"}`));
  if(actor.gunName) print(`${actor.skills.length+1}. Shoot[${actor.gunShells}sh]`,"dim");
  print("Enter to cancel","dim");
  G._subMenu="party_skill"; G._partyActor=actor; G._partyEnemy=e;
}
function handlePartySkill(raw){
  G._subMenu=null;
  if(!raw.trim()){ endCombatCheck(); return; }
  const idx=parseInt(raw.trim())-1;
  const actor=G._partyActor; const e=G._partyEnemy;
  if(actor.gunName&&idx===actor.skills.length){ partyShoot(actor,e); endCombatCheck(); return; }
  const skill=actor.skills[idx];
  if(!skill){ print("Nothing happens.","dim"); endCombatCheck(); return; }
  execSkill(actor,skill,e);
  // Limit check
  if(!actor.limitReady&&(actor.hp<actor.maxHp*0.30||G.dread>65)){
    actor.limitReady=true; print(`\n${actor.name}'s LIMIT is ready! (Press L on your turn.)`,"yellow");
  }
  endCombatCheck(); updateStatusBar();
}

const SKILL_DESCS={aggressive_cross:"Relentless cross-examination. High damage, dread spike.",strike_from_record:"Lower enemy ATK.",procedural_block:"Boost party DEF.",motion_to_suppress:"Enemy loses speed.",find_the_crack:"Lower enemy DEF.",exhibit_suppressed:"Damage + dread drop.",contempt_charge:"Stun enemy 1 turn.",hostile_witness:"Convert enemy ATK to self-damage.",seal_the_record:"Block boss passives for 3 turns.",chain_objection:"3-hit cascade.",counsel_redirect:"Massive damage + big dread drop."};

function execSkill(actor,skill,e){
  const hn=G.huskyName;
  switch(skill){
    case "aggressive_cross":
      const d1=Math.round(ri(11,18)*G.damageMult); const dr1=Math.round(ri(4,7)*G.dreadMult);
      e.hp=Math.max(0,e.hp-d1); addDread(dr1);
      print(`${actor.name} tears the testimony apart. ${e.name} takes ${d1}. +${dr1} Dread.`); break;
    case "strike_from_record": e.atk=Math.max(0,e.atk-3); print(`${actor.name}: "Motion granted." ${e.name} ATK -3.`); break;
    case "procedural_block":
      G._combatDefBonus=(G._combatDefBonus||0)+2; G.party.forEach(p=>p.hp>0&&(p.def+=1));
      print(`${actor.name} raises a procedural objection. Party defense up.`,"accent"); break;
    case "motion_to_suppress": e.spd=Math.max(1,e.spd-4); print(`${actor.name} files to suppress. ${e.name} loses momentum.`); break;
    case "find_the_crack":
      e.def=Math.max(0,e.def-3); const dr2=Math.round(ri(2,5)*G.dreadMult); addDread(dr2);
      print(`${actor.name} finds the crack. ${e.name} DEF -3. +${dr2} Dread.`); break;
    case "exhibit_suppressed":
      const d2=Math.round(ri(9,15)*G.damageMult); const drop=Math.round(8*G.dreadMult);
      e.hp=Math.max(0,e.hp-d2); G.dread=Math.max(0,G.dread-drop);
      print(`${actor.name} re-enters suppressed exhibit. ${e.name} takes ${d2}. -${drop} Dread.`,"green"); break;
    case "contempt_charge":
      e.statusEffects.stunned=(e.statusEffects.stunned||0)+1;
      print(`${actor.name}: "I move for contempt." ${e.name} stunned 1 turn.`,"accent"); break;
    case "hostile_witness":
      const conv=Math.round(e.atk*0.4); e.atk-=conv; e.statusEffects.self_damage=conv;
      print(`${actor.name} turns the witness. ATK -${conv}, self-damage ${conv} next turn.`,"accent"); break;
    case "seal_the_record":
      e.statusEffects.sealed=(e.statusEffects.sealed||0)+3; const dr3=Math.round(ri(3,6)*G.dreadMult); G.dread=Math.max(0,G.dread-dr3);
      print(`${actor.name} seals the record. Boss passives blocked 3 turns. -${dr3} Dread.`,"green"); break;
    case "chain_objection":
      let tot=0;
      [1.0,0.75,0.55].forEach((mult,i)=>{if(e.hp<=0)return;const d=Math.max(1,Math.round((G.atk-e.def)*G.damageMult*mult));e.hp=Math.max(0,e.hp-d);tot+=d;print(`Objection ${i+1}: ${d}.`);});
      print(`Chain objection тАФ ${tot} total.`,"accent"); break;
    case "counsel_redirect":
      const d3=Math.round(ri(22,34)*G.damageMult); const drop2=Math.round(ri(15,22)*G.dreadMult);
      e.hp=Math.max(0,e.hp-d3); G.dread=Math.max(0,G.dread-drop2);
      print(`"Redirect, Your Honor." ${e.name} takes ${d3}. -${drop2} Dread.`,"green"); break;
    default: print("Nothing happens.","dim");
  }
}

function doLimitBreak(actor,e){
  print(`"${actor.limitName}"`,"yellow");
  switch(actor.limitName){
    case "SUSTAINED. SUSTAINED. SUSTAINED.":
      [0,1,2].forEach(()=>{if(e.hp<=0)return;const d=Math.round(ri(8,13)*G.damageMult);e.hp=Math.max(0,e.hp-d);print(`Objection lands. ${e.name} takes ${d}.`);});break;
    case "THE RECORD WILL REFLECT": e.atk-=4;e.def=Math.max(0,e.def-2);print(`${e.name} ATK-4, DEF-2. Cannot argue with the record.`);break;
    case "MISTRIAL": e.spd=1;const d4=Math.round(15*G.dreadMult);G.dread=Math.max(0,G.dread-d4);print(`${e.name} loses all momentum. -${d4} Dread.`,"green");break;
    case "MOTION TO COMPEL": e.atk=Math.max(0,e.atk-3);e.def=Math.max(0,e.def-3);e.spd=Math.max(1,e.spd-3);print("Opposition compelled to reveal everything. All stats reduced.");break;
    case "MATERIAL WITNESS": const d5=Math.round(ri(28,40)*G.damageMult);e.hp=Math.max(0,e.hp-d5);print(`Testifies to something the building cannot refute. ${d5} damage.`,"accent");break;
    case "REASONABLE DOUBT": e.statusEffects.stunned=(e.statusEffects.stunned||0)+2;print(`Doubt introduced. ${e.name} cannot act for 2 turns.`,"accent");break;
    case "READ BACK THE RECORD": const d6=Math.round(ri(20,30)*G.damageMult);const drop3=Math.round(20*G.dreadMult);e.hp=Math.max(0,e.hp-d6);G.dread=Math.max(0,G.dread-drop3);print(`Every hostile word read back. ${d6} damage, -${drop3} Dread.`,"green");break;
    case "I KNOW WHAT YOU DID": const old=e.def;e.def=0;print(`The janitor has seen everything. ${e.name} DEF ${old} тЖТ 0.`,"accent");break;
    default: const d7=Math.round(ri(20,30)*G.damageMult);e.hp=Math.max(0,e.hp-d7);break;
  }
}

function partyShoot(actor,e){
  if(actor.gunShells<actor.gunCost){ print(`${actor.name}: not enough shells.`,"dim"); return; }
  actor.gunShells-=actor.gunCost;
  const dmg=ri(actor.gunDmgMin,actor.gunDmgMax);
  const actual=Math.max(1,dmg-e.def);
  e.hp=Math.max(0,e.hp-actual);
  print(`${actor.name}'s ${actor.gunName} fires. ${e.name} takes ${actual}.`);
  if(e.hp<=0) print(`${e.name} stops.`,"green");
}

function enemyTurn(e){
  if(e.hp<=0) return;
  const hn=G.huskyName;
  e.statusEffects=e.statusEffects||{};
  // Status effects
  if((e.statusEffects.stunned||0)>0){ e.statusEffects.stunned--; print(`${e.name} cannot act. (Stunned)`,"dim"); return; }
  if((e.statusEffects.self_damage||0)>0){ const sd=e.statusEffects.self_damage; delete e.statusEffects.self_damage; e.hp=Math.max(0,e.hp-sd); print(`${e.name} cannot contain the contradiction. Takes ${sd} self-damage.`,"dim"); if(e.hp<=0)return; }
  if((e.statusEffects.sealed||0)>0) e.statusEffects.sealed--;
  // Boss passive
  if(e.isBoss&&Math.random()<0.32&&!(e.statusEffects.sealed>0)){
    const d=Math.round(ri(6,13)*G.dreadMult); addDread(d);
    print(`${e.name} ${pick(BOSS_PASSIVE_LINES)}`,"dim");
    print(`(${hn} notices. The building wants ${hn} to notice.)`,"dim"); print(`+${d} Dread.`,"dim");
    if(G.dread>50&&Math.random()<0.35){ print("\n("+pick(HORROR_INTRUSIONS.slice(G.dread>60?-8:3))+")"," dim"); }
    return;
  }
  // Attack
  const targetParty=G.party.filter(p=>p.hp>0);
  const hitPlayer=Math.random()<0.6||!targetParty.length;
  if(hitPlayer){
    const eff_def=G.def+(G._combatDefBonus||0);
    G._combatDefBonus=0;
    let dmg=Math.max(1,Math.round((e.atk-eff_def)*G.damageMult));
    const verbs=[`presents evidence ${hn} has never seen before. ${hn} has seen it before.`,`calls a witness. The witness describes ${hn}. Accurately.`,`reads from a document. The document is about ${hn}. The date is wrong.`,`approaches the bench. The judge does not look up.`,`introduces an exhibit. The exhibit is a memory.`,`speaks. The words are procedurally correct. Also personally devastating.`];
    print(`${e.name} ${pick(verbs)}`,"dim"); G.hp=Math.max(0,G.hp-dmg); print(`${hn} takes ${dmg}.`,G.hp<G.maxHp*0.3?"red":"");
    if(G.hp<=0) print(`${hn} collapses.`,"red");
  } else {
    const target=pick(targetParty);
    const dmg=Math.max(1,Math.round((e.atk-target.def)*G.damageMult));
    target.hp=Math.max(0,target.hp-dmg);
    print(`${e.name} turns on ${target.name}. ${target.name} takes ${dmg}.`,target.hp<target.maxHp*0.3?"red":"");
    if(target.hp<=0) print(`${target.name} goes down.`,"dim");
  }
  if(Math.random()<0.12) print("\n("+pick(HORROR_INTRUSIONS.slice(G.dread>60?-8:G.dread>30?3:0))+")"," dim");
  // Boss phase transition
  checkBossPhase(e);
}

function checkBossPhase(e){
  if(!e.isBoss) return;
  if(e.phase===1&&e.hp<e.maxHp*0.60){
    e.phase=2;
    const lines=BOSS_PHASE_FLAVOUR[e.name];
    if(lines&&lines[0]) lines[0].forEach(l=>print(l.replace(/\$\{hn\}/g,G.huskyName),"yellow"));
    e.atk+=3; const d=Math.round(ri(8,14)*G.dreadMult); addDread(d);
    print(`${e.name} ATK increased. +${d} Dread.`,"dim");
  }
  if(e.phase===2&&e.hp<e.maxHp*0.25){
    e.phase=3;
    const lines=BOSS_PHASE_FLAVOUR[e.name];
    if(lines&&lines[1]) lines[1].forEach(l=>print(l.replace(/\$\{hn\}/g,G.huskyName),"yellow"));
    e.spd+=3; e.def=Math.max(0,e.def-2); const d=Math.round(ri(10,16)*G.dreadMult); addDread(d);
    print(`${e.name} has stopped being careful. SPD up, DEF down. +${d} Dread.`,"dim");
  }
}

function endCombatCheck(){
  const e=G._enemy;
  if(G.hp<=0){
    G._inCombat=false; G.phase="dead";
    blank(); print(`${G.huskyName} does not finish the trial.`,"red");
    print("Not because "+G.huskyName+" gave up.","dim"); print("Because the building ran out of patience.","dim");
    print("The building has very little patience.","dim"); print("The building has always gotten what it was waiting for.","dim");
    blank(); print(`Room ${G.currentRoom+1} of 40.`,"dim");
    print("The case continues in "+G.huskyName+"'s absence.","dim"); print("The client is found guilty.","dim");
    print("The defendant's chair still has the claw marks in it.","dim"); print("New ones now.","dim");
    blank(); sep("тХР"); setupPhase="done"; G=null; blank(); print("(type anything to return)","dim"); return;
  }
  if(e.hp<=0){
    G._inCombat=false; concludeFight(e); return;
  }
  if(G.dread>=100){ G._inCombat=false; dreadCollapse(); return; }
  // Enemy turn via ATB
  G._atbPlayer+=G.spd; G._atbEnemy+=e.spd;
  if(G._atbEnemy>=100){ G._atbEnemy=0; enemyTurn(e); }
  if(G._inCombat){ showCombatStatus(); promptCombat(); }
  updateStatusBar();
}

function concludeFight(e){
  blank(); print(`${e.name} stops.`); print("Not because it has been defeated.","dim"); print("Because it has run out of argument. For now.","dim");
  const g=ri(10,22)+(e.isBoss?ri(20,35):0); G.scraps+=g; print(`${G.huskyName} finds $${g}.`,"green");
  if(Math.random()<0.40){const s=ri(2,5);G.shells+=s;print(`${s} shells on the floor.`,"green");}
  if(Math.random()<0.28){G.motions++;print("+1 motion to dismiss.","green");}
  if(e.isBoss){const d=Math.round(12*G.dreadMult);G.dread=Math.max(0,G.dread-d);print(`${FLOORS[curRoom().floor-1].name} is quieter now. Not safe. Quieter.`,"dim");print(`-${d} Dread.`,"green");}
  // Clean room
  const r=curRoom(); if(r) r.enemy=null;
  updateStatusBar();
}

function checkEndgame(){
  if(!G) return;
  if(G.currentRoom>=40&&G.hp>0) theVerdict();
  else if(G.hp<=0) contemptOfCourt();
}
function contemptOfCourt(){
  G.phase="done"; setupPhase="done"; blank(); sep("тХР");
  const hn=G.huskyName;

function handleSubMenu(raw){
  if(G._subMenu==="item_combat"){ handleItemCombat(raw); return; }
  if(G._subMenu==="party_pick"){ handlePartyPick(raw); return; }
  if(G._subMenu==="party_skill"){ handlePartySkill(raw); return; }
}

// INPUT
// ============================================================
document.getElementById("cmd").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  const raw=document.getElementById("cmd").value;
  document.getElementById("cmd").value="";
  if(raw.trim()) print(`> ${raw}`,"dim");
  if(setupPhase==="done"||(!G&&setupPhase==="play")){ G=null; startTitle(); return; }
  if(setupPhase!=="play"){ handleSetup(raw); updateStatusBar(); return; }
  if(!G){ startTitle(); return; }
  handlePlay(raw);
  updateStatusBar();
});
document.addEventListener("click",()=>document.getElementById("cmd").focus());
startTitle();
