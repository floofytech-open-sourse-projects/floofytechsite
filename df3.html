function ri(a,b){return Math.floor(Math.random()*(b-a+1))+a;}
function pick(arr){return arr[Math.floor(Math.random()*arr.length)];}
function clamp(v,lo,hi){return Math.max(lo,Math.min(hi,v));}
function uid(){return Math.random().toString(36).substr(2,9);}

const out = document.getElementById("output");
function print(text,cls){
  String(text).split("\n").forEach(l=>{
    const d=document.createElement("div");
    d.className="line"+(cls?" "+cls:"");
    d.textContent=l;
    out.appendChild(d);
  });
  out.scrollTop=out.scrollHeight;
}
function blank(){print("");}
function sep(ch,n){print((ch||"─").repeat(n||55),"dim");}

function makeRoom(name,desc,lore,zone){
  return {id:uid(),name,desc,lore,zone,exits:{},enemies:[],npc:null,visited:false,flags:{},hasFragment:false};
}
function storeRoom(r){G.rooms[r.id]=r;}
function curRoom(){return G.rooms[G.room];}

function buildStartingArea(){
  const path=makeRoom("The Sun-Bleached Path","White stone under a sky that has never dimmed. It hums.","You found the Fang here. It was just lying on the path. Waiting.","surface");
  const agora=makeRoom("The Humming Agora","A market where half-formed people trade things that haven't been invented.","The merchants don't look directly at the Fang. They know what it is, even if you don't.","surface");
  agora.npc={name:"Agora Trader",lines:["Iron slivers, dispellers — I take both.","The ground shook last night. I'm pretending it didn't.","I had a dream that the sun went out. I didn't know what dark was. Still don't.","That weapon you're carrying — I'd put it down if I were you. I'm not you though."]};
  const temple=makeRoom("Temple of the Unfinished","Columns that hum. Roof open to a sky that presses down.","The god this temple was built for hasn't been invented yet. The temple is patient.","surface");
  const crack=makeRoom("The First Crack","A split in the earth that smells cold. Cold is a new concept here.","This is where you go down. The crack wasn't here yesterday. The world made it for you.","descent");
  path.exits.north=agora.id; agora.exits.south=path.id;
  path.exits.east=temple.id; temple.exits.west=path.id;
  path.exits.south=crack.id; crack.exits.north=path.id;
  [path,agora,temple,crack].forEach(r=>storeRoom(r));
  G.room=path.id;
}

function generateRoom(zone){
  const zd=ZONE_ROOMS[zone];
  const r=makeRoom(pick(zd.names),pick(zd.descs),Math.random()<0.6?pick(zd.lore):null,zone);
  const dirs=["north","south","east","west"];
  const n=ri(1,3);
  for(let i=0;i<n;i++){const d=pick(dirs);if(!r.exits[d])r.exits[d]=null;}
  if(zone==="underworld") r.hasFragment=Math.random()<0.25;
  if(Math.random()<G.encounterRate){
    const pool=ENEMY_POOL[zone]||ENEMY_POOL.surface;
    const e=pick(pool);
    r.enemies=[{name:e.name,hp:ri(e.hp[0],e.hp[1]),maxHp:0,atk:ri(e.atk[0],e.atk[1]),def:ri(e.def[0],e.def[1]),spd:e.spd,tags:e.tags}];
  }
  storeRoom(r); return r;
}

function buildHadesRoom(){
  const r=makeRoom("The Chamber at the Bottom of the World","The walls are not stone. They are compressed myth. Everything that will ever die lives here first.",pick(["The walls here are not marble. They are compressed myth.","Hades looks at you with eyes that are still deciding what colour to be.","The Fang vibrates so hard it leaves marks in the air.","The concept of 'death' hovers in the room, waiting to be invented."]),"underworld");
  r.flags.isHades=true; storeRoom(r); return r;
}

  document.getElementById("sb-name").textContent=G.name;

  document.getElementById("sb-hp").innerHTML=`HP <span style="color:${hc}">${G.hp}/${G.maxHp}</span>`;

}

function fractureDesc(){
  const f=G.fracture;
  if(f>=15&&f<30)  print("(The ground hums a note it shouldn't know.)","dim");
  else if(f>=30&&f<45) print("(A crack appears in the nearest wall. It wasn't there before.)","dim");
  else if(f>=45&&f<60) print("(You catch yourself listening for your name. You keep almost hearing it.)","dim");
  else if(f>=60&&f<75) print("(The light flickers. The world is losing its argument with itself.)","dim");
  else if(f>=75&&f<90) print("(The myth is coming apart. You can hear the seams tearing.)","dim");
  else if(f>=90)        print("(The world is almost done fracturing. You are almost done with it.)","red");
}

function describeRoom(forceLore){
  if(!G)return;
  const r=curRoom(); if(!r)return;
  blank();
  print(`[${r.zone.toUpperCase()}]`,"dim");
  print(r.name,"bold");
  print(r.desc);
  if(r.lore&&(!r.visited||forceLore)) print(r.lore,"dim");
  r.visited=true;
  fractureDesc();
  blank();
  const alive=r.enemies.filter(e=>e.hp>0);
  if(alive.length){
    print(`Enemies: ${alive.map(e=>e.name).join(", ")}`,"yellow");
    print("(Type FIGHT to engage.)","dim");
    if(!r.flags.combatTriggered){ r.flags.combatTriggered=true; startBattle(alive); return; }
  } else {
    if(r.flags.isHades&&!G.hadesDefeated){ /* handled by hades start */ }
    else print("(Explore with n/s/e/w)","dim");
  }
  if(r.npc) print(`NPC: ${r.npc.name}`,"accent");
  const exits=Object.keys(r.exits).join(", ");
  print(`Exits: ${exits||"none apparent"}`,"dim");
  // Try companions
  trySpawnCompanions();
  // Fire story beats
  fireBeats();
}

function fireBeats(){
  if(!G) return;
  const beats=[
    ["depth_3",G.depth>=3],["depth_8",G.depth>=8],["enter_descent",G.zone==="descent"&&!G.storyBeatsFired.enter_descent],
    ["depth_14",G.depth>=14],["enter_underworld",G.zone==="underworld"&&!G.storyBeatsFired.enter_underworld],
    ["depth_20",G.depth>=20],["near_hades",G.depth>=22]
  ];
  beats.forEach(([key,cond])=>{
    if(cond&&!G.storyBeatsFired[key]){
      G.storyBeatsFired[key]=true;
      blank();
      STORY_BEATS[key].forEach(l=>print(l,"dim"));
      blank();
    }
  });
}

function trySpawnCompanions(){
  if(!G) return;
  const zone=G.zone;
  const surface=["scout","oracle","smith"];
  const descent=["bard","hunter"];
  const underworld=["seer","keeper","shade"];
  const pool=zone==="surface"?surface:zone==="descent"?descent:underworld;
  pool.forEach(id=>{
    if(G.companionsMet[id]) return;
    const cd=COMPANION_DATA[id];
    if(!cd) return;
    const chance=id==="scout"?0.30:id==="oracle"?0.25:id==="smith"?0.22:id==="bard"?0.35:id==="hunter"?0.30:id==="seer"?0.40:id==="keeper"?0.28:0.35;
    if(Math.random()<chance){
      G.companionsMet[id]=true;
      const member={id,name:cd.name,role:cd.role,hp:cd.hp,maxHp:cd.hp,atk:cd.atk,def:cd.def,spd:cd.spd,skills:cd.skills,limitName:cd.limitName,limitDesc:cd.limitDesc,limitReady:false,statusEffects:{}};
      G.party.push(member);
      blank();
      cd.joinLines.forEach(l=>print(l,"dim"));
      const lines=COMPANION_LINES[id];
      if(lines) curRoom().npc={name:cd.name,lines};
    }
  });
}

function handlePlay(raw){
  if(!G||G.phase==="done") return;
  const c=raw.trim().toLowerCase();
  if(G._pendingConfirm){
    const pc=G._pendingConfirm; G._pendingConfirm=null;
    (c==="y"||c==="yes")?pc.yes():pc.no();
    updateStatus(); return;
  }
  if(G._subMenu){ handleSubMenu(raw); return; }
  if(G._inCombat){ handleCombatInput(raw); return; }

  switch(c){
    case "look": case "l": describeRoom(true); break;
    case "n": case "north": move("north"); break;
    case "s": case "south": move("south"); break;
    case "e": case "east":  move("east");  break;
    case "w": case "west":  move("west");  break;
    case "fight": case "attack": case "battle": fightRoom(); break;
    case "talk": talkNPC(); break;
    case "search": searchArea(); break;
    case "status": showStatusFull(); break;
    case "echo": echoMenu(); break;
    case "fuse": fuseMenu(); break;
    case "forge": forgeEcho(); break;
    case "fang": fangStatus(); break;
    case "gun": gunMenu(); break;
    case "use dispeller": useDispeller(); break;
    case "help": showHelp(); break;
    case "quit": case "exit":
      blank(); print("The myth dissolves.","dim");
      G=null; setupPhase="title"; startTitle(); return;
    default: print("The marble doesn't respond to that.","dim");
  }
  updateStatus();
}

function move(dir){
  const r=curRoom();
  if(r.enemies.some(e=>e.hp>0)){ print("Something is in the way. Deal with it first.","dim"); return; }
  let destId=r.exits[dir];
  if(destId===undefined){ print("The way is blocked.","dim"); return; }
  if(!destId){
    G.depth++;
    let newZone=G.depth<=8?"surface":G.depth<=16?"descent":"underworld";
    // Transition
    if(newZone!==G.zone){
      const old=G.zone; G.zone=newZone;
      if(old==="surface"&&newZone==="descent"){
        blank(); print("The ground opens.","dim"); print("Not like a wound. Like a mouth.","dim"); print("Not threatening — just ready.","dim"); print("The world has been waiting to swallow you since you picked up the Fang.","dim"); print("You step in.","dim"); blank();
        G.fangLevel=Math.max(G.fangLevel,2); print(`The Fang brightens as you descend. (Fang Lv ${G.fangLevel})`,"gold");
      } else if(old==="descent"&&newZone==="underworld"){
        blank(); print("The last light from above disappears.","dim"); print("Not gradually. Between one step and the next.","dim"); print("The underworld doesn't ease you in.","dim"); print("It simply begins.","dim"); print("You are in it now.","dim"); blank();
        G.fangLevel=Math.max(G.fangLevel,3); print(`The Fang hums with recognition. (Fang Lv ${G.fangLevel})`,"gold");
      }
    }
    // Build room or Hades
    let nr;
    if(G.depth>=25&&!G.hadesDefeated){ nr=buildHadesRoom(); }
    else{ nr=generateRoom(G.zone); }
    r.exits[dir]=nr.id;
    if(nr.exits[oppositeDir(dir)]===undefined) nr.exits[oppositeDir(dir)]=r.id;
    destId=nr.id;
    // Add fracture for descent/underworld
    if(G.zone!=="surface"){
      const fg=Math.round(ri(1,4)*(G.zone==="underworld"?1.5:1)*G.fractureMult);
      addFracture(fg);
    }
  }
  G.room=destId;
  const nr=curRoom();
  showStatusFull();
  describeRoom();
  // Hades
  if(nr.flags&&nr.flags.isHades&&!G.hadesDefeated) startHades();
  updateStatus();
}

function oppositeDir(d){return {north:"south",south:"north",east:"west",west:"east"}[d]||"south";}

function addFracture(n){
  G.fracture=clamp(G.fracture+Math.round(n*G.fractureMult),0,100);
  if(G.fracture>=100) fractureEnd();
}
function fractureEnd(){
  blank(); print("The world fractures completely.","red");
  print("The myth collapses around you.","red");
  print(`${G.name} is erased by a world that couldn't hold itself together.`,"red");
  G.phase="dead"; G.hp=0; setupPhase="done";
  blank(); print("(type anything to return)","dim");
}

  if(!avail.length){ print("No new echoes to find.","dim"); return; }

  if(G.echoFragments>=5){ G.echoFragments-=5; grantRandomEcho("forged fragments"); print("The fragments fuse.","accent"); }

function handleSubMenu(raw){
  const c=raw.trim().toLowerCase();
  if(G._subMenu==="echo_equip"){
    G._subMenu=null;
    if(!c.trim()) return;
    const echoes=Object.values(G.echoes);
    const idx=parseInt(c)-1;
    if(echoes[idx]){ G.equippedEcho=echoes[idx]; print(`${echoes[idx].name} settles over your fur.`,"green"); }
    else print("Invalid.","dim");
    updateStatus(); return;
  }
  if(G._subMenu==="fuse_a"){
    const idx=parseInt(c)-1; G._fuseA=G._fusePool[idx];
    if(!G._fuseA){ print("Invalid.","dim"); G._subMenu=null; return; }
    print("Second Echo:","dim"); G._subMenu="fuse_b"; return;
  }
  if(G._subMenu==="fuse_b"){
    G._subMenu=null;
    const idx=parseInt(c)-1; const b=G._fusePool[idx];
    if(!b||b===G._fuseA){ print("Invalid.","dim"); return; }
    const result=fuseEchoes(G._fuseA,b);
    print(`Fusion: ${result.name} (${result.arcana})`,"accent");
    print("Accept? (y/n)","dim");
    G._pendingConfirm={yes:()=>{delete G.echoes[G._fuseA.name];delete G.echoes[b.name];G.echoes[result.name]=result;G.equippedEcho=result;print(`${result.name} is born.`,"green");},no:()=>print("Fusion refused.","dim")};
    return;
  }
  if(G._subMenu==="gun"){
    G._subMenu=null;
    if(!c.trim()) return;
    const idx=parseInt(c)-1;
    if(idx===MYTH_GUNS.length){ G.gun=null; print("Unequipped.","dim"); }
    else if(MYTH_GUNS[idx]){ G.gun=MYTH_GUNS[idx]; print(`You take up the ${G.gun.name}.`,"green"); }
    updateStatus(); return;
  }
  if(G._subMenu==="merchant"){
    G._subMenu=null;
    if(c==="1"){if(G.ironSlivers>=20){G.ironSlivers-=20;G.bandage++;print("+1 bandage.","green");}else print("Not enough.","dim");}
    else if(c==="2"){if(G.ironSlivers>=35){G.ironSlivers-=35;G.dispellers++;print("+1 dispeller.","green");}else print("Not enough.","dim");}
    else if(c==="3"){if(G.ironSlivers>=55){G.ironSlivers-=55;G.echoFragments++;print(`Echo fragment. (${G.echoFragments}/5)`,"green");if(G.echoFragments>=5)forgeEcho(true);}else print("Not enough.","dim");}
    else print("Left.","dim");
    updateStatus(); return;
  }
  if(G._subMenu==="skill_pick"){ handleSkillPick(raw); return; }
  if(G._subMenu==="target"){ handleTargetPick(raw); return; }
  if(G._subMenu==="item_pick"){ handleItemPick(raw); return; }
}

function fuseEchoes(a,b){
  const map={"solar+chthonic":"unformed","solar+feral":"solar","solar+unformed":"divine","solar+divine":"solar","chthonic+feral":"feral","chthonic+unformed":"chthonic","chthonic+divine":"unformed","feral+unformed":"feral","feral+divine":"divine","unformed+divine":"unformed"};
  const pair=[a.arcana,b.arcana].sort().join("+");
  const arcana=map[pair]||pick([a.arcana,b.arcana]);
  const st={hp:Math.round((a.stats.hp+b.stats.hp)/2),atk:Math.round((a.stats.atk+b.stats.atk)/2),def:Math.round((a.stats.def+b.stats.def)/2),spd:Math.round((a.stats.spd+b.stats.spd)/2)};
  const skills=[...new Set([...a.skills,...b.skills])].slice(0,3);
  const passives=[...new Set([...a.passives,...b.passives])].slice(0,2);
  return {name:`${a.name.split(" ")[0]}-${b.name.split(" ")[0]} Echo`,arcana,stats:st,skills,passives,level:1,xp:0,lore:"Two selves collapsed into one that is neither."};
}

// ============================================================
// COMBAT
// ============================================================
function fightRoom(){
  const r=curRoom();
  const alive=r.enemies.filter(e=>e.hp>0);
  if(!alive.length){ print("Nothing to fight here.","dim"); return; }
  startBattle(alive);
}

function startBattle(enemies){
  enemies.forEach(e=>{if(!e.maxHp)e.maxHp=e.hp;});
  G._inCombat=true; G._combatEnemies=enemies;
  G._combatRoster=buildRoster(enemies);
  G._atb={}; G._combatRoster.forEach(c=>G._atb[c.id]=0);
  G._hadesPhase=1;
  blank(); sep("─");
  print(`[The Fang hums. Something moves.]`,"gold");
  print(`Enemies: ${enemies.map(e=>e.name).join(", ")}`,"yellow");
  sep("─");
  showCombatStatus();
  advanceCombat();
}

function buildRoster(enemies){
  const e=G.equippedEcho;
  const pa={
    id:"player",name:G.name,role:"leader",
    hp:G.hp+(e?e.stats.hp:0), maxHp:G.maxHp+(e?e.stats.hp:0),
    atk:G.atk+(G.fangLevel*2)+(e?e.stats.atk:0),
    def:G.def+(e?e.stats.def:0),
    spd:G.spd+(e?e.stats.spd:0),
    skills:["basic_attack","guard","use_dispeller","use_item",...(e?e.skills:[])],
    limitName:"Fang Ascendant",limitDesc:"The Fang reaches full power.",limitReady:false,statusEffects:{}
  };
  return [pa, ...G.party.map(p=>({...p,hp:p.hp,maxHp:p.maxHp})), ...enemies];
}

function showCombatStatus(){
  blank(); print("── PARTY ──","dim");
  G._combatRoster.filter(c=>c.role).forEach(c=>{
    const lim=c.limitReady?" [LIMIT]":"";
    print(`${c.name}: HP ${c.hp}/${c.maxHp}${lim}`,c.hp<c.maxHp*0.3?"red":"");
  });
  print("── ENEMIES ──","dim");
  G._combatEnemies.filter(e=>e.hp>0).forEach(e=>print(`${e.name}: HP ${e.hp}/${e.maxHp}`));
  print(`Fracture: ${G.fracture} | Myth Charges: ${G.mythCharges}`,"dim");
}

function advanceCombat(){
  if(!G._inCombat) return;
  checkLimitBreaks();
  const alive=G._combatRoster.filter(c=>c.hp>0);
  alive.forEach(c=>G._atb[c.id]=(G._atb[c.id]||0)+(c.spd||c.speed||9));
  const actor=alive.find(c=>G._atb[c.id]>=100);
  if(!actor){ advanceCombat(); return; }
  G._atb[actor.id]=0;
  if(actor.role){ G._activeActor=actor; promptCombat(actor); }
  else { enemyTurn(actor); checkCombatEnd(); if(G._inCombat) advanceCombat(); }
}

function checkLimitBreaks(){
  const thresh=G.equippedEcho?.passives?.includes("echo_fang_resonance")?0.45:0.30;
  G._combatRoster.filter(c=>c.role&&!c.limitReady).forEach(c=>{
    if(c.hp<c.maxHp*thresh||G.fracture>65){ c.limitReady=true; print(`${c.name}'s limit breaks open!`,"gold"); }
  });
}

function promptCombat(actor){
  blank(); print(`${actor.name}'s turn.`,"accent");
  const gunLabel=G.gun?`Shoot[${G.mythCharges}ch]`:"Shoot[no gun]";
  print(`1.Attack  2.Skill  3.Dispeller  4.Item  5.Guard  6.${gunLabel}${actor.limitReady?"  7.Limit":""}`);
}

function handleCombatInput(raw){
  const c=raw.trim().toLowerCase();
  const actor=G._activeActor;
  if(!actor) return;
  if(G._subMenu){ handleSubMenu(raw); return; }
  if(c==="fkill"){ G._combatEnemies.forEach(e=>e.hp=0); print(".","dim"); checkCombatEnd(); return; }
  const alive=G._combatEnemies.filter(e=>e.hp>0);
  switch(c){
    case "1":
      if(alive.length>1){ pickTarget("attack"); return; }
      doAttack(actor,alive[0]); break;
    case "2": skillMenu(actor); return;
    case "3": combatDispeller(actor); break;
    case "4": itemMenu(actor); return;
    case "5": actor.def+=2; print(`${actor.name} braces.`,"dim"); break;
    case "6": doShoot(actor,alive); break;
    case "7":
      if(actor.limitReady){ doLimitBreak(actor,alive); actor.limitReady=false; }
      else print("Not ready yet.","dim"); break;
    default: print("You hesitate. The enemy doesn't.","dim");
  }
  checkCombatEnd(); if(G._inCombat) advanceCombat();
}

function pickTarget(action){
  const alive=G._combatEnemies.filter(e=>e.hp>0);
  print("Target:","accent"); alive.forEach((e,i)=>print(`${i+1}. ${e.name} (${e.hp} HP)`));
  G._subMenu="target"; G._targetAction=action;
}
function handleTargetPick(raw){
  G._subMenu=null;
  const idx=parseInt(raw.trim())-1;
  const alive=G._combatEnemies.filter(e=>e.hp>0);
  const t=alive[idx]||alive[0];
  const actor=G._activeActor;
  if(G._targetAction==="attack") doAttack(actor,t);
  else if(G._targetAction==="skill") executeSkill(actor,t,G._targetSkill,alive);
  else if(G._targetAction==="shoot") doShootTarget(actor,t);
  checkCombatEnd(); if(G._inCombat) advanceCombat();
  updateStatus();
}

function doAttack(actor,t){
  if(!t||t.hp<=0) return;
  const dmg=Math.max(1,Math.round((actor.atk-t.def)*G.damageMult));
  t.hp=clamp(t.hp-dmg,0,99999);
  print(`${actor.name} strikes ${t.name} for ${dmg}.`);
  if(t.hp<=0) print(`${t.name} dissolves back into myth.`,"dim");
}

function combatDispeller(actor){
  if(G.dispellers<=0){ print("No dispellers.","dim"); return; }
  G.dispellers--;
  const heal=ri(10,18); actor.hp=Math.min(actor.maxHp,actor.hp+heal);
  G.fracture=Math.max(0,G.fracture-8);
  print(`+${heal} HP, -8 Fracture.`,"green");
  if(actor.id==="player") G.hp=actor.hp;
}

function itemMenu(actor){
  blank(); print(`Items: 1. Bandage (${G.bandage})`, "accent");
  G._subMenu="item_pick"; G._itemActor=actor;
}
function handleItemPick(raw){
  G._subMenu=null;
  if(raw.trim()==="1"){
    if(G.bandage>0){ G.bandage--; const h=ri(8,14); G._itemActor.hp=Math.min(G._itemActor.maxHp,G._itemActor.hp+h); print(`+${h} HP.`,"green"); if(G._itemActor.id==="player") G.hp=G._itemActor.hp; }
    else print("None left.","dim");
  }
  checkCombatEnd(); if(G._inCombat) advanceCombat(); updateStatus();
}

function doShoot(actor,alive){
  if(!G.gun){ print("No myth-weapon equipped.","dim"); return; }
  if(G.mythCharges<G.gun.charges){ print(`Need ${G.gun.charges} charges.`,"dim"); return; }
  if(G.gun.effect==="aoe_fracture"){
    G.mythCharges-=G.gun.charges;
    print("The Titan Burst fires. The world protests.","gold");
    alive.forEach(e=>{const d=Math.round(ri(G.gun.dmgMin,G.gun.dmgMax)*G.damageMult*0.75);e.hp=clamp(e.hp-d,0,99999);print(`${e.name} takes ${d}.`);});
    const f=ri(3,8); addFracture(f); print(`+${f} Fracture from the blast.`,"red");
  } else if(alive.length>1){ pickTarget("shoot"); return; }
  else { doShootTarget(actor,alive[0]); }
}
function doShootTarget(actor,t){
  G.mythCharges-=G.gun.charges;
  const dmg=Math.round(ri(G.gun.dmgMin,G.gun.dmgMax)*G.damageMult);
  t.hp=clamp(t.hp-dmg,0,99999);
  if(G.gun.effect==="pneuma_burn"){ t.def=Math.max(0,t.def-3); t.spd=Math.max(0,t.spd-3); print(`Pneuma Rifle — ${dmg} dmg, DEF/SPD -3.`,"gold"); }
  else { print(`Myth Caster fires. ${t.name} takes ${dmg}.`); }
  if(t.hp<=0) print(`${t.name} dissolves.`,"dim");
  print(`(${G.mythCharges} charges)`, "dim");
}

function skillMenu(actor){
  blank(); print("Skills:","accent");
  actor.skills.forEach((s,i)=>print(`${i+1}. ${s.replace(/_/g," ")} — ${SKILL_DESCS[s]||"?"}`));
  print("Enter to cancel","dim");
  G._subMenu="skill_pick"; G._skillActor=actor;
}
function handleSkillPick(raw){
  G._subMenu=null;
  if(!raw.trim()){ checkCombatEnd(); if(G._inCombat)advanceCombat(); return; }
  const idx=parseInt(raw)-1;
  const actor=G._skillActor;
  const skill=actor.skills[idx];
  if(!skill){ print("Nothing happens.","dim"); checkCombatEnd(); if(G._inCombat)advanceCombat(); return; }
  const alive=G._combatEnemies.filter(e=>e.hp>0);
  const needsTarget=["swift_strike","track_weakness","fate_read","echo_solar_strike","echo_blinding_rush","echo_chthonic_rend","echo_feral_rush","echo_unmake","echo_column_crush","echo_titan_slam","echo_song_stun","echo_void_step","echo_endure","echo_survive","echo_myth_weave"].includes(skill);
  if(needsTarget&&alive.length>1){ G._targetAction="skill"; G._targetSkill=skill; G._targetActor=actor; pickTarget("skill"); return; }
  executeSkill(actor,alive[0],skill,alive);
  checkCombatEnd(); if(G._inCombat)advanceCombat(); updateStatus();
}

function executeSkill(actor,t,skill,all){
  const roster=G._combatRoster; const enemies=G._combatEnemies.filter(e=>e.hp>0);
  switch(skill){
    case "swift_strike": if(t){const d=Math.round(actor.atk*1.3*G.damageMult);t.hp=clamp(t.hp-d,0,9999);print(`${actor.name} strikes fast — ${d}!`,"accent");} break;
    case "track_weakness": if(t){t.def=Math.max(0,t.def-3);print(`${t.name} DEF -3.`);} break;
    case "hymn_of_stone": roster.filter(c=>c.role).forEach(c=>c.def+=3); print("Party DEF +3.","accent"); break;
    case "discord_shout": enemies.forEach(e=>e.atk=Math.max(0,e.atk-2)); print("All enemies ATK -2.","accent"); break;
    case "fate_read": if(t){t.spd=0;print(`${t.name} loses all speed.`);} break;
    case "unwrite_fate": enemies.forEach(e=>{e.atk=Math.max(0,e.atk-2);e.def=Math.max(0,e.def-2);}); print("All enemies ATK/DEF -2.","accent"); break;
    case "guard_entry": roster.filter(c=>c.role).forEach(c=>c.def+=3); print(`${actor.name} plants their feet. Party DEF +3.`,"accent"); break;
    case "echo_solar_strike": if(t){const bonus=G.fangLevel*3;const d=Math.round((actor.atk+bonus)*G.damageMult);t.hp=clamp(t.hp-d,0,9999);print(`Solar strike — ${d} damage!`,"gold");} break;
    case "echo_blinding_rush": if(t){const d=Math.round(actor.atk*G.damageMult);t.hp=clamp(t.hp-d,0,9999);t.spd=0;print(`${d} damage, ${t.name} blinded.`);} break;
    case "echo_chthonic_rend": if(t){const d=Math.round(ri(12,20)*G.damageMult);t.hp=clamp(t.hp-d,0,9999);print(`Underworld force — ${d}, DEF ignored.`,"accent");} break;
    case "echo_void_step": actor.statusEffects.dodge_next=true; print(`${actor.name} steps between moments.`,"accent"); break;
    case "echo_feral_rush": if(t){let tot=0;for(let i=0;i<ri(2,4);i++){const d=Math.max(1,Math.round((actor.atk-t.def)*G.damageMult));t.hp=clamp(t.hp-d,0,9999);tot+=d;}print(`Feral rush — ${tot} total!`,"accent");} break;
    case "echo_pack_memory": roster.filter(c=>c.role).forEach(c=>c.hp=Math.min(c.maxHp,c.hp+6)); print("Party heals 6 HP.","green"); break;
    case "echo_divine_ward": roster.filter(c=>c.role).forEach(c=>c.statusEffects.warded=true); print("Divine ward — absorbs next hit for all.","accent"); break;
    case "echo_unmake": if(t){const d=Math.round(ri(18,28)*G.damageMult);t.hp=clamp(t.hp-d,0,9999);actor.hp=Math.max(0,actor.hp-6);print(`Unmake — ${d} dmg, 6 backlash.`,"accent");} break;
    case "echo_stone_shout": enemies.forEach(e=>e.spd=0); print("Stone shouts. All enemies lose speed.","accent"); break;
    case "echo_column_crush": if(t){const d=Math.round(ri(20,30)*G.damageMult);t.hp=clamp(t.hp-d,0,9999);print(`Column falls — ${d}!`,"accent");} break;
    case "echo_titan_slam": if(t){const d=Math.round(ri(22,34)*G.damageMult);t.hp=clamp(t.hp-d,0,9999);print(`Titan's memory — ${d}!`,"gold");} break;
    case "echo_earth_split": enemies.forEach(e=>{const d=Math.round(ri(7,12)*G.damageMult);e.hp=clamp(e.hp-d,0,9999);}); print("Earth splits. All take damage.","accent"); break;
    case "echo_song_stun": if(t){t.spd=0;print(`First song — ${t.name} freezes.`,"accent");} break;
    case "echo_myth_weave": { const h=ri(8,14)+G.fangLevel*2; actor.hp=Math.min(actor.maxHp,actor.hp+h); print(`Myth weaves closed. +${h} HP.`,"green"); } break;
    case "echo_survive": if(actor.hp<actor.maxHp*0.20){const h=Math.round(actor.maxHp*0.30);actor.hp=Math.min(actor.maxHp,actor.hp+h);print(`Echo refuses to end. +${h} HP.`,"green");}else print("Not desperate enough yet.","dim"); break;
    case "echo_endure": actor.statusEffects.endure_next=true; print(`${actor.name} braces. Next hit halved.`,"dim"); break;
    default: print("The myth doesn't respond.","dim");
  }
  if(actor.id==="player") G.hp=clamp(actor.hp,0,G.maxHp);
}

function doLimitBreak(actor,alive){
  print(`${actor.limitName}!`,"gold");
  switch(actor.id){
    case "player":
      alive.forEach(e=>{const d=Math.round(ri(25,40)*G.damageMult*G.fangLevel);e.hp=clamp(e.hp-d,0,9999);print(`${e.name} takes ${d}!`,"gold");}); break;
    case "scout": case "hunter":
      alive.forEach((e,i)=>{const d=Math.round((ri(15,22)+i*4)*G.damageMult);e.hp=clamp(e.hp-d,0,9999);e.def=Math.max(0,e.def-2);print(`${e.name} takes ${d}, DEF-2.`);}); break;
    case "bard":
      alive.forEach(e=>{e.spd=0;e.atk=Math.max(0,e.atk-4);});print("All enemies stunned and weakened.","accent"); break;
    case "seer":
      if(alive[0]){const d=Math.round(alive[0].maxHp*0.5*G.damageMult);alive[0].hp=clamp(alive[0].hp-d,0,9999);print(`Future collapses — ${d} (50% max HP).`,"gold");} break;
    case "smith":
      if(alive[0]){const d=Math.round(actor.atk*2.5*G.damageMult);alive[0].hp=clamp(alive[0].hp-d,0,9999);print(`Unforged weapon — ${d}, ignores DEF.`,"gold");} break;
    case "oracle":
      G._combatRoster.filter(c=>c.role).forEach(c=>c.atk+=3); alive.forEach(e=>e.spd=0); print("Prophecy breaks — party ATK+3, enemies stunned.","gold"); break;
    case "keeper":
      G._combatRoster.filter(c=>c.role&&c.id!=="keeper").forEach(c=>c.statusEffects.warded=true); actor.def+=10; print("Oros takes everything. Party warded.","accent"); break;
    case "shade":
      actor.statusEffects.dodge_next=true; alive.forEach(e=>{const d=Math.round(ri(12,18)*G.damageMult);e.hp=clamp(e.hp-d,0,9999);}); print("The Unfinished vanishes. Something strikes from the void.","accent"); break;
    default: alive.forEach(e=>{const d=Math.round(ri(20,30)*G.damageMult);e.hp=clamp(e.hp-d,0,9999);}); break;
  }
}

function enemyTurn(enemy){
  if(enemy.hp<=0) return;
  const party=G._combatRoster.filter(c=>c.role&&c.hp>0);
  if(!party.length) return;
  const t=pick(party);
  if(t.statusEffects.dodge_next){ delete t.statusEffects.dodge_next; print(`${t.name} steps aside. The attack passes through nothing.`,"dim"); return; }
  let dmg=Math.max(1,Math.round((enemy.atk-t.def)*G.damageMult));
  if(t.statusEffects.warded){ delete t.statusEffects.warded; print(`${enemy.name} attacks — the ward absorbs it.`,"dim"); return; }
  if(t.statusEffects.endure_next){ dmg=Math.round(dmg*0.5); delete t.statusEffects.endure_next; }
  t.hp=clamp(t.hp-dmg,0,9999);
  print(`${enemy.name} strikes ${t.name} for ${dmg}.`,t.hp<t.maxHp*0.3?"red":"");
  if(t.hp<=0) print(`${t.name} collapses.`,"dim");
  if(t.id==="player") G.hp=t.hp;
}

function checkCombatEnd(){
  if(!G._inCombat) return;
  const pa=G._combatRoster.find(c=>c.id==="player");
  if(pa&&pa.hp<=0){
    G.hp=0; G._inCombat=false;
    blank(); print(`${G.name} falls.`,"red");
    print("The first death in a world that wasn't ready for one.","dim");
    G.phase="dead"; G.hp=0;
    blank(); print("The Ink-Scared Pup tears itself free from your soul.","dim");
    print("It flees.","dim"); print("It will find someone else. Centuries from now.","dim");
    setupPhase="done"; G=null; blank(); print("(type anything to return)","dim"); return;
  }
  if(G._combatEnemies.every(e=>e.hp<=0)){
    G._inCombat=false; syncParty(); concludeBattle(); return;
  }
  if(G.fracture>=100){ G._inCombat=false; fractureEnd(); }
}

function syncParty(){
  const pa=G._combatRoster.find(c=>c.id==="player");
  if(pa) G.hp=clamp(pa.hp,0,G.maxHp);
  G.party.forEach(pm=>{const ra=G._combatRoster.find(c=>c.id===pm.id);if(ra)pm.hp=clamp(ra.hp,0,pm.maxHp);});
}

function concludeBattle(){
  const r=curRoom(); if(r) r.enemies=r.enemies.filter(e=>e.hp>0);
  blank(); print("The enemies dissolve back into the myth they came from.","dim");
  const gain=ri(8,18); G.ironSlivers+=gain; G.kills+=G._combatEnemies.length;
  print(`+${gain} iron slivers.`,"green");
  if(Math.random()<0.22){ G.echoFragments++; print(`Echo fragment. (${G.echoFragments}/5)`,"green"); if(G.echoFragments>=5)forgeEcho(true); }
  if(Math.random()<0.28){ const c=ri(1,3); G.mythCharges+=c; print(`+${c} myth charges.`,"green"); }
  if(Math.random()<0.07&&!G.gun){
    const gun=pick(MYTH_GUNS); print(`Enemy carried: ${gun.name}.`); print(gun.desc,"dim");
    print("Equip it? (y/n)","accent");
    G._pendingConfirm={yes:()=>{G.gun=gun;print(`Equipped.`,"green");},no:()=>print("Left it.","dim")};
  }
  if(G.equippedEcho){
    const xp=ri(4,9); G.equippedEcho.xp+=xp;
    const needed=G.equippedEcho.level*10;
    if(G.equippedEcho.xp>=needed){ G.equippedEcho.xp-=needed; G.equippedEcho.level++; G.equippedEcho.stats.atk++;G.equippedEcho.stats.def++;G.equippedEcho.stats.spd++;G.equippedEcho.stats.hp+=2; print(`Echo ${G.equippedEcho.name} → Level ${G.equippedEcho.level}!`,"accent"); }
  }
  G.fracture=Math.max(0,G.fracture-10);
  updateStatus();
}

function startHades(){
  blank(); sep("═");
  print("The chamber is vast and wrong.","dim");
  print("The walls breathe.","dim");
  print("The air has weight.","dim");
  blank();
  print("A figure stands at the centre — half-formed, flickering,","dim");
  print("still deciding what shape a god should take.","dim");
  blank();
  print('"You were not meant to find me."',"gold");
  print('"But you came anyway."',"gold");
  blank();
  print("THE INCOMPLETE GOD — HADES — FIRST DEATH — UNWRITTEN RULER","bold");
  if(G.equippedEcho){
    const lines={chthonic:'"That Echo," he says. "It smells like here. Like me. Interesting."',solar:'"You brought sunlight into a place that hasn\'t invented dark yet. Bold."',feral:'"A hunter. Good. I was hoping for someone who understood endings."',divine:'"Another unfinished god," he says. "We are a matched set."',unformed:'"We are the same," he says softly. "Neither of us is finished."'};
    const l=lines[G.equippedEcho.arcana]; if(l){ blank(); print(l,"dim"); }
  }
  sep("═");
  const hades={name:"The Incomplete God",hp:400,maxHp:400,atk:13,def:7,spd:11,tags:["divine","boss","chthonic"],isHades:true};
  G._hadesPhase=1;
  startBattle([hades]);
}

// Override enemy turn for Hades phases
const _origEnemyTurn=enemyTurn;
function enemyTurn(enemy){
  if(!enemy.isHades){ _origEnemyTurn(enemy); return; }
  hadesEnemyTurn(enemy);
  // Phase transitions
  if(enemy.hp<250&&G._hadesPhase===1){ G._hadesPhase=2; blank(); print("Hades flickers. His form solidifies — then breaks apart again.","yellow"); print('"This is what I am," he says. "Not finished. Not stopped."',"dim"); addFracture(15); }
  if(enemy.hp<100&&G._hadesPhase===2){ G._hadesPhase=3; blank(); print('Hades falls to one knee. The chamber trembles.',"yellow"); print('"If you do this," he says, "the world will not recover."'); print('"I know," he says. "I can see it from here."',"dim"); G.fangLevel=4; print(`The Fang reaches its final form. (Fang Lv 4)`,"gold"); }
}

function hadesEnemyTurn(enemy){
  const party=G._combatRoster.filter(c=>c.role&&c.hp>0); if(!party.length) return;
  const t=pick(party);
  if(t.statusEffects.dodge_next){ delete t.statusEffects.dodge_next; print(`${t.name} steps aside.`,"dim"); return; }
  switch(G._hadesPhase){
    case 1:
      let dmg1=Math.round(ri(9,14)*G.damageMult);
      if(t.statusEffects.warded){ delete t.statusEffects.warded; print("Hades reaches forward — the ward absorbs it.","dim"); return; }
      if(t.statusEffects.endure_next){ dmg1=Math.round(dmg1*0.5); delete t.statusEffects.endure_next; }
      t.hp=clamp(t.hp-dmg1,0,9999); print(`Hades reaches forward. ${t.name} takes ${dmg1}.`); break;
    case 2:
      print("Hades rewrites the battlefield. The party stumbles.","yellow");
      G._combatRoster.filter(c=>c.role).forEach(c=>c.spd=Math.max(1,c.spd-2)); addFracture(8); break;
    case 3:
      let dmg3=Math.round(ri(14,20)*G.damageMult);
      if(t.statusEffects.endure_next){ dmg3=Math.round(dmg3*0.5); delete t.statusEffects.endure_next; }
      t.hp=clamp(t.hp-dmg3,0,9999); print(`"I'm sorry," Hades says. ${t.name} takes ${dmg3}.`,"dim"); break;
  }
  if(t.hp<=0) print(`${t.name} collapses.`,"dim");
  if(t.id==="player") G.hp=t.hp;
}

// Override concludeBattle for Hades
const _origConclude=concludeBattle;
function concludeBattle(){
  if(G._combatEnemies.some(e=>e.isHades)){ concludeHades(); return; }
  _origConclude();
}

function concludeHades(){
  G._inCombat=false; G.hadesDefeated=true; syncParty();
  G.fracture=clamp(G.fracture+20,0,100);
  blank(); print("Hades falls.","dim");
  print("Not with a crash. With a sigh.","dim");
  print('"I wasn\'t finished," he says.',"dim");
  print('"Neither was the world."',"dim");
  blank(); print("The chamber begins to collapse.","yellow");
  triggerEnding();
}

document.getElementById("cmd").addEventListener("keydown",e=>{
  if(e.key!=="Enter") return;
  const raw=document.getElementById("cmd").value;
  document.getElementById("cmd").value="";
  if(raw.trim()) print(`> ${raw}`,"dim");
  if(setupPhase==="done"||(!G&&setupPhase==="play")){ G=null; startTitle(); return; }
  if(setupPhase!=="play"){ handleSetup(raw); updateStatus(); return; }
  if(!G){ startTitle(); return; }
  handlePlay(raw);
  updateStatus();
});
document.addEventListener("click",()=>document.getElementById("cmd").focus());
